- id: 5d81b950-b82f-4382-8695-739d005a59ef
  name: Devices
  description:
    content: 'Device listing and detail

      Returns UniFi Mobile Router devices registered in a workspace.

      '
    type: text/plain
  item:
  - id: f90cdcd6-127c-4fa4-8a24-8ec5668f0bd2
    name: List devices
    request:
      name: List devices
      description:
        content: 'Returns a paginated list of devices in the workspace.

          Each item contains identity and status fields only.

          Use `getDevice` for full detail.


          **Scope**: `read:mobility`

          '
        type: text/plain
      url:
        path:
        - v1
        - mobility
        - workspaces
        - :workspaceID
        - devices
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: limit
          value: '200'
          description: Maximum records per page. Capped at 200.
        - disabled: false
          key: offset
          value: '0'
          description: Number of records to skip.
        variable:
        - disabled: false
          type: any
          value: <uuid>
          key: workspaceID
          description: '(Required) Workspace UUID. Obtain from API call: GET /v1/mobility/workspaces'
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
