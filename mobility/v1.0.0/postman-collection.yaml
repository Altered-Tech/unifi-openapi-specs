        status\": \"PENDING\",\n      \"is_owner\": false,\n      \"permissions\"\
        : null\n    }\n  ],\n  \"total\": 3,\n  \"offset\": 0,\n  \"limit\": 0,\n\
        \  \"httpStatusCode\": 200,\n  \"traceId\": \"7f3a1c2b-d4e5-4f6a-8b9c-0d1e2f3a4b5c\"\
        \n}"
