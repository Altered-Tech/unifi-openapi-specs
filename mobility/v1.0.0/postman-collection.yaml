info:
  _postman_id: e4d2a30b-f673-400f-891a-5a180af63a48
  name: UniFi Mobility API
  schema: https://schema.getpostman.com/json/collection/v2.1.0/collection.json
  description:
    content: "Proxy API for UniFi Mobility services exposed through the cloudservice-apis\
      \ gateway.\nRequests are authenticated at the proxy layer and forwarded to the\
      \ mobility cloud.\n\n\n## Quick Start\n\n```bash\n# 1. Obtain an API key from\
      \ the UniFi Cloud Platform with mobility scope\n# 2. List your workspaces\n\
      curl https://api.ui.com/v1/mobility/workspaces \\\n  -H \"X-API-Key: <your-key>\"\
      \n\n# 3. List devices in a workspace\ncurl https://api.ui.com/v1/mobility/workspaces/<workspaceID>/devices\
      \ \\\n  -H \"X-API-Key: <your-key>\"\n\n# 4. Get full detail for a device\n\
      curl https://api.ui.com/v1/mobility/workspaces/<workspaceID>/devices/<deviceID>\
      \ \\\n  -H \"X-API-Key: <your-key>\"\n```\n\n## Authentication\n\nEvery request\
      \ must include the API key in the `X-API-Key` header.\nAPI keys carry two layers\
      \ of access control:\n\n**App scope** — the key must be issued with `mobility`\
      \ app scope.\nKeys without this scope receive `403 forbidden`.\n\n**Read / write\
      \ scope** — controls which operations the key can perform:\n\n| Scope | Permitted\
      \ operations |\n|-------|----------------------|\n| `read:mobility` | All `GET`\
      \ endpoints |\n| `write:mobility` | All `PUT` endpoints (requires `read:mobility`\
      \ as well) |\n\n## Request Headers\n\n| Header | Required | Description |\n\
      |--------|----------|-------------|\n| `X-API-Key` | Yes | API key for authentication\
      \ |\n| `X-Request-ID` | No | Client-supplied trace identifier for end-to-end\
      \ tracing. |\n\n## Rate Limiting\n\n**100 requests per minute** per API key\
      \ across all mobility endpoints.\nWhen the limit is exceeded, `429 Too Many\
      \ Requests` is returned immediately.\n\n## Response Format\n\nAll responses\
      \ use a **unified format** with `httpStatusCode` and `traceId` as common fields.\n\
      \n### Success — single item\n\n```json\n{\n  \"data\": { ... },\n  \"httpStatusCode\"\
      : 200,\n  \"traceId\": \"abc-123\"\n}\n```\n\n### Success — collection (paginated)\n\
      \n```json\n{\n  \"data\": [ ... ],\n  \"total\": 42,\n  \"offset\": 0,\n  \"\
      limit\": 200,\n  \"httpStatusCode\": 200,\n  \"traceId\": \"abc-123\"\n}\n```\n\
      \n### Success — no content (PUT)\n\nHTTP `204` with an empty body.\n\n### Error\n\
      \n```json\n{\n  \"code\": \"upstream_error\",\n  \"httpStatusCode\": 404,\n\
      \  \"message\": \"device not found\",\n  \"traceId\": \"abc-123\"\n}\n```\n\n\
      **Error codes:**\n\n| `code` | HTTP | When |\n|--------|------|------|\n| `unauthorized`\
      \ | 401 | API key is missing, expired, or invalid |\n| `forbidden` | 403 | Key\
      \ lacks `mobility` app scope or read/write scope |\n| `rate_limit` | 429 | Rate\
      \ limit exceeded |\n| `upstream_error` | 400, 404, 500 | Validation error, resource\
      \ not found, or service error |\n| `server_error` | 500 | Unexpected internal\
      \ error |\n\n\nContact Support:\n Name: UniFi Cloud Platform Team"
    type: text/plain
