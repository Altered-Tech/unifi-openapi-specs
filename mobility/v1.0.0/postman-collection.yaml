  - id: 4a40e4be-d65d-460e-b9b3-10d37c4d0aa1
    name: List workspace admins
    request:
      name: List workspace admins
      description:
        content: 'Returns all admins for a workspace with their permission levels.


          The caller must have active membership. Only mobility permissions are exposed.


          Admins are sorted: owner first, then active > pending > inactive > declined.


          **Scope**: `read:mobility`

          '
        type: text/plain
      url:
        path:
        - v1
        - mobility
        - workspaces
        - :workspaceID
        - admins
        host:
        - '{{baseUrl}}'
        query: []
        variable:
        - disabled: false
          type: any
          value: <uuid>
          key: workspaceID
          description: '(Required) Workspace UUID. Obtain from API call: GET /v1/mobility/workspaces'
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
