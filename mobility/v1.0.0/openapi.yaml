                          example: HQ-VPN
                        vpn_status:
                          type: string
                          description: "- `CONNECTING` â\x80\x94 tunnel being established\n\
                            - `CONNECTED` â\x80\x94 tunnel active\n- `DISCONNECTED`\
                            \ â\x80\x94 configured but not connected\n- `FAILED` â\x80\
                            \x94 connection failed\n- `\"\"` â\x80\x94 no VPN session\n"
                          enum:
                          - CONNECTING
                          - CONNECTED
                          - DISCONNECTED
                          - FAILED
                          - ''
                          example: CONNECTED
                        firewall_rule_names:
                          type: array
                          items:
                            type: string
                          example:
                          - Block-IoT-Outbound
                        routing_rule_names:
                          type: array
                          items:
                            type: string
                          example: []
                        ddns_profile_names:
                          type: array
                          items:
                            type: string
                          example: []
                        subscription_plan:
                          type: string
                          description: 'Active data plan. Empty when no subscription.


                            | Value | Description |

                            |-------|-------------|

                            | `FREE_TRIAL` | Free trial |

                            | `1GB` | Monthly 1 GB |

                            | `5GB` | Monthly 5 GB |

                            | `20GB` | Monthly 20 GB |

                            | `2GB` | Daily 2 GB (QA/test) |

                            | `CLOUD` | Cloud plan (daily/yearly/3-year) |

