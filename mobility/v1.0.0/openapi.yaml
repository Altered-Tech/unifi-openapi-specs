  /v1/mobility/workspaces/{workspaceID}/devices/{deviceID}/clients:
    get:
      operationId: listDeviceClients
      summary: List device clients
      description: 'Returns a paginated list of all clients associated with a device,

        including ONLINE, OFFLINE, and BLOCKED clients.


        `wifi_experience` is omitted for wired clients (`type = WIRED`).


        **Scope**: `read:mobility`

        '
      tags:
      - Clients
      parameters:
      - name: workspaceID
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: 'Workspace UUID. Obtain from API call: GET /v1/mobility/workspaces'
      - name: deviceID
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: 'Device UUID. Obtain from API call: GET /v1/mobility/workspaces/{workspaceID}/devices'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 200
        description: Maximum records per page. Capped at 200.
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        description: Number of records to skip.
      responses:
        '200':
          description: Paginated client list.
          content:
            application/json:
              schema:
                description: Paginated list of device clients.
                allOf:
                - type: object
                  description: Common envelope fields shared by all paginated collection
                    responses.
                  properties:
                    total:
                      type: integer
                      description: Total number of records matching the query, ignoring
                        pagination.
                    offset:
                      type: integer
