                          type: string
                          description: 'LTE signal quality derived from RSSI (dBm).


                            | Value | RSSI range | Description |

                            |-------|-----------|-------------|

                            | `NO_SIGNAL` | < -111 dBm | No usable signal |

                            | `POOR` | -111 to -100 dBm | Weak signal |

                            | `FAIR` | -99 to -89 dBm | Moderate signal |

                            | `STRONG` | -88 dBm or better | Good signal |

                            | `""` | N/A | RSSI not yet reported |

                            '
                          enum:
                          - NO_SIGNAL
                          - POOR
                          - FAIR
                          - STRONG
                          - ''
                          example: FAIR
                        cellular_data_usage_bytes:
                          type: integer
                          format: int64
                          description: Data consumed in the current billing cycle,
                            in bytes.
                          example: 524288000
