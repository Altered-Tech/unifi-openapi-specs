                            title: DeviceLocation
                          description: Omitted (not null) when no GPS fix is available.
                    title: DeviceDetail
                  httpStatusCode:
                    type: integer
                    description: HTTP status code.
                  traceId:
                    type: string
                    description: Matches `X-Request-ID` if provided, otherwise auto-generated.
                required:
