                        query parameter).
                    limit:
                      type: integer
                      description: Page size applied (echoes the `limit` query parameter).
                    httpStatusCode:
                      type: integer
                      description: HTTP status code.
                    traceId:
                      type: string
                      description: Matches `X-Request-ID` if provided, otherwise auto-generated.
                  required:
                  - httpStatusCode
                  - traceId
                  title: PaginationMeta
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                        description: A client associated with a device.
                        properties:
                          mac:
                            type: string
                            description: MAC address in upper-case colon-separated
                              format.
                            example: AA:BB:CC:DD:EE:FF
                          name:
                            type: string
                            example: John's iPhone
                          type:
                            type: string
                            enum:
                            - WIRED
                            - WIRELESS
                            example: WIRELESS
                          connection_status:
                            type: string
                            description: "- `ONLINE` â\x80\x94 actively connected\n\
                              - `OFFLINE` â\x80\x94 previously connected, no longer\
                              \ seen\n- `BLOCKED` â\x80\x94 network access blocked;\
                              \ `is_blocked` will be `true`\n"
                            enum:
                            - ONLINE
                            - OFFLINE
                            - BLOCKED
                            example: ONLINE
                          ip_address:
                            type: string
                            description: Empty when unknown.
                            example: 192.168.1.100
                          is_blocked:
                            type: boolean
                            example: false
                          wifi_experience:
                            type: integer
                            minimum: 0
                            maximum: 100
                            nullable: true
                            description: 'WiFi experience score (0-100). **Omitted**
                              for wired clients.

                              '
                            example: 85
                        required:
                        - mac
                        - name
                        - type
                        - connection_status
                        - ip_address
                        - is_blocked
                        title: DeviceClient
                  required:
                  - data
                title: DeviceClientListResponse
              example:
                data:
                - mac: AA:BB:CC:DD:EE:FF
                  name: John's iPhone
                  type: WIRELESS
                  connection_status: ONLINE
                  ip_address: 192.168.1.100
                  is_blocked: false
                  wifi_experience: 85
                - mac: 11:22:33:44:55:66
                  name: NAS
                  type: WIRED
                  connection_status: ONLINE
                  ip_address: 192.168.1.50
                  is_blocked: false
                total: 2
                offset: 0
                limit: 200
                httpStatusCode: 200
