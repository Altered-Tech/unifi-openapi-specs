  - id: f1c7f1b9-7964-4d31-af3d-fc05365eda78
    name: Connector - DELETE
    request:
      name: Connector - DELETE
      description:
        content: 'Forward DELETE requests to UniFi applications using RESTful HTTP
          methods. <br/><br/>**Request Flow**: The request is proxied through `api.ui.com`
          cloud endpoint to the remote console at `http://127.0.0.1/proxy/[path]`
          with DELETE method. <br/><br/>**Requirements**: <br/>- Console firmware
          version must >= 5.0.3<br/>- For non-organization API keys: Limited to API
          key owner''s consoles only (cannot access other admins'' consoles)<br/>-
          For organization API keys: Can access any console within the organization<br/><br/>**Rate
          Limit**: <br/>- Each console is limited to 100 requests per minute<br/><br/>**Limits**:
          <br/>- Request timeout: each proxied request must complete within 25 seconds;
          otherwise it is terminated and a timeout error is returned<br/>- Response
          body size: the upstream response body is limited to 10 MB; larger responses
          are not supported<br/><br/>**API Documentation**: <br/>- Network API: [https://developer.ui.com/network](https://developer.ui.com/network)<br/>-
          Protect API: [https://developer.ui.com/protect](https://developer.ui.com/protect)<br/><br/>**Response**:
          On success, the upstream API response is passed through directly. On error,
          a standardized error schema is returned.'
        type: text/plain
      url:
        path:
        - v1
        - connector
        - consoles
        - :id
        - '*path'
        host:
        - '{{baseUrl}}'
        query: []
        variable:
        - disabled: false
          type: any
          value: <string>
          key: id
          description: (Required) Host ID to proxy the request to
        - disabled: false
          type: any
          value: <string>
          key: path
          description: (Required) API path to proxy
      header:
      - key: Accept
        value: application/json
      method: DELETE
      auth: null
    response:
