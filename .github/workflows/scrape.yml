name: Fetch UniFi API Specs

on:
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Re-fetch all versions (overwrite existing)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install vacuum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: curl -fsSL https://quobix.com/scripts/install_vacuum.sh | sh

      - name: Fetch specs
        run: |
          if [ "${{ github.event.inputs.force_all }}" = "true" ]; then
            python api-scraper.py --validate
          else
            python api-scraper.py --check-new --validate
          fi

      - name: Check for new files
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New or updated specs:"
            git diff --staged --name-only
          fi

      - name: Commit and push new specs
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update UniFi API specs [skip ci]

          $(git diff HEAD~1 --name-only | sed 's/^/- /')"
          git push
