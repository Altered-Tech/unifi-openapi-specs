openapi: 3.1.0
info:
  title: UniFi Protect API
  version: 0.0.0
servers:
- url: https://{host}/proxy/protect/integration
  description: Local (direct access)
  variables:
    host:
      default: 192.168.1.1
      description: IP address or hostname of the UniFi console
paths:
  /v1/meta/info:
    get:
      summary: Get application information
      description: Get generic information about the Protect application
      tags:
      - Information about application
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  applicationVersion:
                    type: string
                    description: Protect application version
                    examples:
                    - 1.0.0
                    title: protectVersion
                required:
                - applicationVersion
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
                    examples:
                    - Unexpected API error occurred
                  name:
                    type: string
                    description: Name of the error
                    examples:
                    - API_ERROR
                  cause:
                    type: object
                    additionalProperties: {}
                    description: An optional nested cause for the parent error
                    examples:
                    - error: Unexpected functionality error
                      name: UNKNOWN_ERROR
                required:
                - error
                - name
                title: genericError
  /v1/viewers/{id}:
    get:
      summary: Get viewer details
      description: Get detailed information about a specific viewer
      tags:
      - Viewer information & management
      parameters:
      - in: path
        name: id
        description: The primary key of viewer
        schema:
          type: string
          description: The primary key of viewer
          examples:
          - 66d025b301ebc903e80003ea
          - 672094f900e26303e800062a
          title: viewerId
        required: true
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The primary key of viewer
                    examples:
                    - 66d025b301ebc903e80003ea
                    - 672094f900e26303e800062a
                    title: viewerId
                  modelKey:
                    type: string
                    const: viewer
                    description: The model key of the viewer
                    title: viewerModelKey
                  state:
                    type: string
                    enum:
                    - CONNECTED
                    - CONNECTING
                    - DISCONNECTED
                    description: Connection state of the device.
                    examples:
                    - CONNECTED
                    - CONNECTING
                    - DISCONNECTED
                    title: deviceState
                  name:
                    oneOf:
                    - type: string
                      description: The name of the model
                      title: name
                    - type: 'null'
                  mac:
                    type: string
                    description: The MAC address of the device
                    title: mac
                  liveview:
                    oneOf:
                    - type: string
                      description: The primary key of liveview
                      examples:
                      - 66d025b301ebc903e80003ea
                      - 672094f900e26303e800062a
                      title: liveviewId
                    - type: 'null'
                  streamLimit:
                    type: number
                    description: Count of maximum supported parallel live streams.
                    title: streamLimit
                required:
                - id
                - modelKey
                - state
                - name
                - mac
                - liveview
                - streamLimit
                title: viewer
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
                    examples:
                    - Unexpected API error occurred
                  name:
                    type: string
                    description: Name of the error
                    examples:
                    - API_ERROR
                  cause:
                    type: object
                    additionalProperties: {}
                    description: An optional nested cause for the parent error
                    examples:
                    - error: Unexpected functionality error
                      name: UNKNOWN_ERROR
                required:
                - error
                - name
                title: genericError
    patch:
      summary: Patch viewer settings
      description: Patch the settings for a specific viewer
      tags:
      - Viewer information & management
      parameters:
      - in: path
        name: id
        description: The primary key of viewer
        schema:
          type: string
          description: The primary key of viewer
          examples:
          - 66d025b301ebc903e80003ea
          - 672094f900e26303e800062a
          title: viewerId
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the model
                  title: name
                liveview:
                  oneOf:
                  - type: string
                    description: The primary key of liveview
                    examples:
                    - 66d025b301ebc903e80003ea
                    - 672094f900e26303e800062a
                    title: liveviewId
                  - type: 'null'
              additionalProperties: false
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The primary key of viewer
                    examples:
                    - 66d025b301ebc903e80003ea
                    - 672094f900e26303e800062a
                    title: viewerId
                  modelKey:
                    type: string
                    const: viewer
                    description: The model key of the viewer
                    title: viewerModelKey
                  state:
                    type: string
                    enum:
                    - CONNECTED
                    - CONNECTING
                    - DISCONNECTED
                    description: Connection state of the device.
                    examples:
                    - CONNECTED
                    - CONNECTING
                    - DISCONNECTED
                    title: deviceState
                  name:
                    oneOf:
                    - type: string
                      description: The name of the model
                      title: name
                    - type: 'null'
                  mac:
                    type: string
                    description: The MAC address of the device
                    title: mac
                  liveview:
                    oneOf:
                    - type: string
                      description: The primary key of liveview
                      examples:
                      - 66d025b301ebc903e80003ea
                      - 672094f900e26303e800062a
                      title: liveviewId
                    - type: 'null'
                  streamLimit:
                    type: number
                    description: Count of maximum supported parallel live streams.
                    title: streamLimit
                required:
                - id
                - modelKey
                - state
                - name
                - mac
                - liveview
                - streamLimit
                title: viewer
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
                    examples:
                    - Unexpected API error occurred
                  name:
                    type: string
                    description: Name of the error
                    examples:
                    - API_ERROR
                  cause:
