                          volume:
                            type: number
                            minimum: 0
                            maximum: 100
                            description: How loud should the ringtone be played. 0
                              being silent and 100 the loudest.
                        required:
                        - cameraId
                        - repeatTimes
                        - ringtoneId
                        - volume
                        title: ringSettings
                      description: List of custom ringtone settings for (doorbell-only)
                        cameras paired to this chime.
                  required:
                  - id
                  - modelKey
                  - state
                  - name
                  - mac
                  - cameraIds
                  - ringSettings
                  title: chime
