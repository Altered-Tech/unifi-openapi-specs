                    description: The model key of the liveview
                    title: liveviewModelKey
                  name:
                    type: string
                    description: The name of this live view.
                  isDefault:
                    type: boolean
                    description: Whether this live view is the default one for all
                      viewers.
                  isGlobal:
                    type: boolean
                    description: Whether this live view is global and available system-wide
                      to all users
                  owner:
