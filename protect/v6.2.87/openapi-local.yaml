                        type: array
                        items:
                          type: string
                          enum:
                          - person
                          - vehicle
                          - package
                          - licensePlate
                          - face
                          - animal
                        description: What smart detection object types do the camera
                          support.
                      smartDetectAudioTypes:
                        type: array
                        items:
                          type: string
                          enum:
                          - alrmSmoke
                          - alrmCmonx
                          - alrmSiren
                          - alrmBabyCry
                          - alrmSpeak
                          - alrmBark
                          - alrmBurglar
                          - alrmCarHorn
                          - alrmGlassBreak
                        description: What smart detection audio types do the camera
                          support.
                      videoModes:
                        type: array
                        items:
                          type: string
                          enum:
                          - default
                          - highFps
                          - homekit
                          - sport
                          - slowShutter
                          - lprReflex
                          - lprNoneReflex
                        description: A list of supported video modes by the camera
                      hasMic:
                        type: boolean
                        description: Whether the camera has a microphone
                      hasLedStatus:
                        type: boolean
                        description: Whether the camera has LED status
                      hasSpeaker:
                        type: boolean
                        description: Whether the camera has a speaker to support talkback
                    required:
