          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: The primary key of chime
                      examples:
                      - 66d025b301ebc903e80003ea
                      - 672094f900e26303e800062a
                      title: chimeId
                    modelKey:
                      type: string
                      const: chime
                      description: The model key of the chime
                      title: chimeModelKey
                    state:
                      type: string
                      enum:
                      - CONNECTED
                      - CONNECTING
                      - DISCONNECTED
                      description: Connection state of the device.
                      examples:
                      - CONNECTED
                      - CONNECTING
                      - DISCONNECTED
                      title: deviceState
                    name:
                      oneOf:
                      - type: string
                        description: The name of the model
                        title: name
                      - type: 'null'
                    mac:
                      type: string
                      description: The MAC address of the device
                      title: mac
                    cameraIds:
                      type: array
                      items:
                        type: string
                        description: The primary key of camera
                        examples:
                        - 66d025b301ebc903e80003ea
                        - 672094f900e26303e800062a
                        title: cameraId
                      description: The list of (doorbell-only) cameras which this
                        chime is paired to.
                    ringSettings:
                      type: array
                      items:
                        type: object
                        properties:
