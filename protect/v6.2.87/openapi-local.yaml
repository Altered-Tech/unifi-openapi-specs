  /v1/cameras/{id}/talkback-session:
    post:
      summary: Create talkback session for camera
      description: Returns the talkback stream URL and audio configuration for a specific
        camera
      tags:
      - Camera information & management
      parameters:
      - in: path
        name: id
        description: The primary key of camera
        schema:
          type: string
          description: The primary key of camera
          examples:
          - 66d025b301ebc903e80003ea
          - 672094f900e26303e800062a
          title: cameraId
        required: true
      responses:
        '200':
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                    description: Talkback stream URL
                    examples:
                    - rtp://192.168.1.123:7004
                    title: talkbackStreamUrl
                  codec:
                    type: string
                    description: Audio format to use.
                    examples:
                    - opus
                    title: talkbackStreamCodec
                  samplingRate:
                    type: integer
                    exclusiveMinimum: 0
                    description: Sampling Rate.
                    examples:
                    - 24000
                    title: talkbackStreamSamplingRate
                  bitsPerSample:
                    type: integer
                    exclusiveMinimum: 0
                    description: Bits per sample.
                    examples:
                    - 16
                    title: talkbackStreamBitsPerSample
                required:
                - url
                - codec
                - samplingRate
                - bitsPerSample
                description: Talkback session information
                examples:
                - url: rtp://192.168.1.123:7004
                  codec: opus
                  samplingRate: 24000
                  bitsPerSample: 16
                title: talkbackSession
        default:
          description: Error response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error message
                    examples:
                    - Unexpected API error occurred
                  name:
                    type: string
                    description: Name of the error
                    examples:
                    - API_ERROR
                  cause:
                    type: object
                    additionalProperties: {}
                    description: An optional nested cause for the parent error
                    examples:
                    - error: Unexpected functionality error
                      name: UNKNOWN_ERROR
                required:
                - error
                - name
                title: genericError
