                    - 66d025b301ebc903e80003ea
                    - 672094f900e26303e800062a
                    title: cameraId
                  modelKey:
                    type: string
                    const: camera
                    description: The model key of the camera
                    title: cameraModelKey
                  state:
                    type: string
                    enum:
                    - CONNECTED
                    - CONNECTING
                    - DISCONNECTED
                    description: Connection state of the device.
                    examples:
                    - CONNECTED
                    - CONNECTING
                    - DISCONNECTED
                    title: deviceState
                  name:
                    oneOf:
                    - type: string
                      description: The name of the model
                      title: name
                    - type: 'null'
                  mac:
                    type: string
                    description: The MAC address of the device
                    title: mac
                  isMicEnabled:
                    type: boolean
                    description: Whether or not the microphone on camera is enabled
                    title: isMicEnabled
                  osdSettings:
                    type: object
                    properties:
                      isNameEnabled:
                        type: boolean
                        description: Whether to show the name in the OSD.
                        title: osdIsNameEnabled
                      isDateEnabled:
                        type: boolean
                        description: Whether to show the date in the OSD.
                        title: osdIsDateEnabled
                      isLogoEnabled:
                        type: boolean
                        description: Whether to show the logo in the bottom right
                          corner.
                        title: osdIsLogoEnabled
                      isDebugEnabled:
                        type: boolean
                        description: Whether debug info is enabled.
                        title: osdIsDebugEnabled
                      overlayLocation:
                        type: string
                        enum:
                        - topLeft
                        - topMiddle
                        - topRight
                        - bottomLeft
                        - bottomMiddle
                        - bottomRight
                        description: The location of the overlay on the screen.
                        title: osdOverlayLocation
                    required:
                    - isNameEnabled
                    - isDateEnabled
                    - isLogoEnabled
                    - isDebugEnabled
                    - overlayLocation
                    description: On Screen Display settings.
                    title: osdSettings
                  ledSettings:
                    type: object
                    properties:
                      isEnabled:
                        type: boolean
                        description: Indicates whether the status LED is enabled.
                        title: ledIsEnabled
                      welcomeLed:
                        type: boolean
                        description: Indicates whether the welcome LED is enabled.
                        title: ledWelcomeLed
                      floodLed:
                        type: boolean
                        description: Indicates whether the flood LED is enabled.
                        title: ledFloodLed
                    required:
                    - isEnabled
                    - welcomeLed
                    - floodLed
                    description: LED settings.
                    title: ledSettings
