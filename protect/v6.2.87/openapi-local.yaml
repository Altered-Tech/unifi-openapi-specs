                          enum:
                          - alrmSmoke
                          - alrmCmonx
                          - alrmSiren
                          - alrmBabyCry
                          - alrmSpeak
                          - alrmBark
                          - alrmBurglar
                          - alrmCarHorn
                          - alrmGlassBreak
                        title: objectTypes
                    required:
                    - objectTypes
                    - audioTypes
                    description: Smart detection settings for the camera.
                    title: smartDetectSettings
                required:
                - id
                - modelKey
                - state
                - name
                - mac
                - isMicEnabled
                - osdSettings
                - ledSettings
                - lcdMessage
                - micVolume
                - activePatrolSlot
