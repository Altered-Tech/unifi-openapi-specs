                      text:
                        type: string
                    title: lcdMessageUnion
                  micVolume:
                    type: number
                    minimum: 0
                    maximum: 100
                    description: 'Mic volume: a number from 0-100.'
                    title: micVolume
                  activePatrolSlot:
                    oneOf:
                    - type: number
