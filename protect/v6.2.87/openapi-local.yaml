    activePatrolSlotString:
      type: string
      title: activePatrolSlotString
      description: The slot number (0-4) of the patrol that is currently running,
        or null if no patrol is running
      examples:
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
    alarmTriggerId:
      type: string
      description: User defined string used to trigger only specific alarms. Alarm
        should be configured with the same ID to be triggered.
      examples:
      - AnyRandomString
      title: alarmTriggerId
    idRequiredError:
      type: object
      properties:
        error:
          type: string
          description: Error message
          examples:
          - '''id'' is required'
        name:
          type: string
          description: Name of the error
          examples:
          - BAD_REQUEST
        cause:
          type: object
          additionalProperties: {}
          description: An optional nested cause for the parent error
          examples:
          - error: Unexpected functionality error
            name: UNKNOWN_ERROR
      required:
      - error
      - name
      title: idRequiredError
    lcdMessage:
      oneOf:
      - type: object
        properties:
          type:
            type: string
            const: DO_NOT_DISTURB
          resetAt:
            type:
            - number
            - 'null'
            description: UNIX timestamp when doorbell message should be removed (if
              not set then `nvr.doorbellSettings.defaultMessageResetTimeoutMs` is
              used, if set to `null` then interpreted as "forever")
        required:
        - type
        description: Show a pre-defined "do not disturb" message on the doorbell
      - type: object
        properties:
          type:
            type: string
            const: LEAVE_PACKAGE_AT_DOOR
          resetAt:
            type:
            - number
            - 'null'
            description: UNIX timestamp when doorbell message should be removed (if
              not set then `nvr.doorbellSettings.defaultMessageResetTimeoutMs` is
              used, if set to `null` then interpreted as "forever")
        required:
        - type
        description: Show a pre-defined "leave package at door" message on the doorbell
      - type: object
        properties:
          type:
            type: string
            const: CUSTOM_MESSAGE
          resetAt:
            type:
            - number
            - 'null'
            description: UNIX timestamp when doorbell message should be removed (if
              not set then `nvr.doorbellSettings.defaultMessageResetTimeoutMs` is
              used, if set to `null` then interpreted as "forever")
          text:
            type: string
            description: The custom text message to show on the doorbell
            examples:
            - Hello world!
        required:
        - type
        - text
        description: Show a custom text message on the doorbell
      - type: object
        properties:
          type:
            type: string
            const: IMAGE
          resetAt:
            type:
            - number
            - 'null'
            description: UNIX timestamp when doorbell message should be removed (if
              not set then `nvr.doorbellSettings.defaultMessageResetTimeoutMs` is
              used, if set to `null` then interpreted as "forever")
          text:
            type: string
            description: The ID of the custom image to show on the doorbell
            examples:
            - 34225b30-fe6a-11af-1690-29424bd911c2.png
        required:
        - type
        - text
        description: Show a custom image on the doorbell
      title: lcdMessage
