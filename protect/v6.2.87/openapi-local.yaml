        item:
          oneOf:
          - type: object
            properties:
              id:
                type: string
                description: The primary key of event
                examples:
                - 66d025b301ebc903e80003ea
                - 672094f900e26303e800062a
                title: eventId
              modelKey:
                type: string
                const: event
                description: The model key of the event
                title: eventModelKey
              type:
                type: string
                const: ring
              start:
                type: number
                exclusiveMinimum: 0
                description: Unix timestamp of the start time of the event.
                examples:
                - 1445408038748
                - 1741267544209
              end:
                type:
                - number
                - 'null'
                description: Unix timestamp of the end time of the event.
                examples:
                - 1445408048748
                - 1741267554209
              device:
                type: string
                description: The primary key of device
                examples:
                - 66d025b301ebc903e80003ea
                - 672094f900e26303e800062a
                title: deviceId
            required:
            - id
            - modelKey
            - type
            - start
            - device
            description: A device ring button has been pressed
            title: ringEvent
          - type: object
            properties:
              id:
                type: string
                description: The primary key of event
                examples:
                - 66d025b301ebc903e80003ea
                - 672094f900e26303e800062a
                title: eventId
              modelKey:
                type: string
                const: event
                description: The model key of the event
                title: eventModelKey
              type:
                type: string
                const: sensorExtremeValues
              start:
                type: number
                exclusiveMinimum: 0
                description: Unix timestamp of the start time of the event.
                examples:
                - 1445408038748
                - 1741267544209
              end:
                type:
                - number
                - 'null'
                description: Unix timestamp of the end time of the event.
                examples:
                - 1445408048748
                - 1741267554209
              device:
                type: string
                description: The primary key of device
                examples:
                - 66d025b301ebc903e80003ea
                - 672094f900e26303e800062a
                title: deviceId
              metadata:
                type: object
                properties:
                  sensorType:
                    type: object
                    properties:
                      text:
                        type: string
                        enum:
                        - temperature
                        - light
                        - humidity
                    required:
                    - text
                    description: Name of the metric measured by the sensor
                    examples:
                    - text: temperature
                  sensorValue:
                    type: object
                    properties:
                      text:
                        type: number
                        description: Decimal value of the metric measured by the sensor
                        title: sensorValue
                    required:
                    - text
                  status:
                    type: object
                    properties:
                      text:
                        type: string
                        enum:
                        - neutral
                        - low
                        - safe
                        - high
                        - unknown
                        description: What range does the measured metric fall into
                        title: sensorStatus
                        examples:
                        - high
                    required:
                    - text
                required:
                - sensorType
                - sensorValue
                - status
            required:
            - id
            - modelKey
            - type
            - start
