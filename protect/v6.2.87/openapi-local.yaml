      tags:
      - Camera PTZ control & management
      parameters:
      - in: path
        name: id
        description: The primary key of camera
        schema:
          type: string
          description: The primary key of camera
          examples:
          - 66d025b301ebc903e80003ea
          - 672094f900e26303e800062a
          title: cameraId
        required: true
      - in: path
        name: slot
        description: The slot number (0-4) of the patrol that is currently running,
          or null if no patrol is running
        schema:
          type: string
          title: activePatrolSlotString
