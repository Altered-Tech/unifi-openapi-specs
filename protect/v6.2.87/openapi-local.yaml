                    - 66d025b301ebc903e80003ea
                    - 672094f900e26303e800062a
                    title: userId
                  layout:
                    type: number
                    minimum: 1
                    maximum: 26
                    description: The number of slots this live view contains. Which
                      as a consequence also affects the layout of the live view.
                  slots:
                    type: array
                    items:
                      type: object
                      properties:
                        cameras:
                          type: array
                          items:
                            type: string
                            description: The primary key of camera
                            examples:
                            - 66d025b301ebc903e80003ea
                            - 672094f900e26303e800062a
                            title: cameraId
                        cycleMode:
                          type: string
                          enum:
                          - motion
                          - time
                          description: Whether to switch to next camera in slot based
                            on motion events or a strict time interval
                        cycleInterval:
                          type: number
                          description: How long should each camera stream be shown
                            for in seconds until we cycle to the next camera
                      required:
                      - cameras
                      - cycleMode
                      - cycleInterval
                      description: Which cameras will be visible in a given slot and
                        how will they be cycled through
                    description: List of cameras visible in each given slot. And cycling
