- id: ae051024-9cc0-4770-8ffb-fa33dc3ff37c
  name: Sites
  description:
    content: 'Endpoints for listing and managing UniFi sites within a local Network
      application.

      Site ID is required for most other API requests.'
    type: text/plain
  item:
  - id: bb224790-3a7f-461d-a720-dfc4fa64b7d7
    name: List Local Sites
    request:
      name: List Local Sites
      description:
        content: 'Retrieve a paginated list of local sites managed by this Network
          application.

          Site ID is required for other UniFi Network API calls.


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`id`|`UUID`|`eq` `ne` `in` `notIn`|

          |`internalReference`|`STRING`|`eq` `ne` `in` `notIn`|

          |`name`|`STRING`|`eq` `ne` `in` `notIn`|

          </details>'
        type: text/plain
      url:
        path:
        - v1
        - sites
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
          key: consoleId
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
    - id: 5dfb5dad-c36a-468d-bfde-d53c4b9b58ca
      name: OK
      originalRequest:
        url:
          path:
          - v1
          - sites
          host:
          - '{{baseUrl}}'
          query:
          - key: offset
            value: '0'
          - key: limit
            value: '25'
          - key: filter
            value: <string>
          variable:
          - description: ID of the console to proxy requests to
            type: any
            value: '{{consoleId}}'
            key: consoleId
        header:
        - key: Accept
          value: application/json
        method: GET
        body: {}
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: "{\n  \"count\": 10,\n  \"data\": [\n    {\n      \"id\": \"ca57131a-0f26-8083-1c1e-8ee48e20b9de\"\
        ,\n      \"internalReference\": \"string\",\n      \"name\": \"string\"\n\
        \    },\n    {\n      \"id\": \"3272dfd0-6f3f-7b6a-420a-88cca100457a\",\n\
        \      \"internalReference\": \"string\",\n      \"name\": \"string\"\n  \
