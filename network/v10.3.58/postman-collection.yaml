  - id: d4e4dc7e-f619-4455-8ef0-92859ef7de90
    name: List ACL Rules
    request:
      name: List ACL Rules
      description:
        content: 'Retrieve a paginated list of all ACL rules on a site.


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`type`|`STRING`|`eq` `ne` `in` `notIn`|

