- id: 596f9cbb-f1e9-44d2-bc16-130af37a44c0
  name: UniFi Devices
  description:
    content: 'Endpoints to list, inspect, and interact with UniFi devices, including
      adopted and pending devices.

      Provides device stats, port control, and actions.'
    type: text/plain
  item:
  - id: effea93e-4c3c-4f10-aa66-ee39a2ce2c82
    name: List Devices Pending Adoption
    request:
      name: List Devices Pending Adoption
      description:
        content: 'Retrieve a paginated list of devices pending adoption, including
          basic device information.


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`macAddress`|`STRING`|`eq` `ne` `in` `notIn`|

          |`ipAddress`|`STRING`|`eq` `ne` `in` `notIn`|

          |`model`|`STRING`|`eq` `ne` `in` `notIn`|

          |`state`|`STRING`|`eq` `ne` `in` `notIn`|

          |`supported`|`BOOLEAN`|`eq` `ne`|

          |`firmwareVersion`|`STRING`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
          `le` `like` `in` `notIn`|

          |`firmwareUpdatable`|`BOOLEAN`|`eq` `ne`|

          |`features`|`SET(STRING)`|`isEmpty` `contains` `containsAny` `containsAll`
          `containsExactly`|

          </details>'
        type: text/plain
      url:
        path:
        - v1
        - pending-devices
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
