    WirelessClientDetails:
      allOf:
      - type: object
        discriminator:
          propertyName: type
          mapping:
            WIRED: '#/components/schemas/WiredClientDetails'
            WIRELESS: '#/components/schemas/WirelessClientDetails'
            VPN: '#/components/schemas/VPNClientConnectionDetails'
            TELEPORT: '#/components/schemas/TeleportClientConnectionDetails'
        properties:
          type:
            type: string
          id:
            type: string
            format: uuid
          name:
            type: string
          connectedAt:
            type: string
            format: date-time
          ipAddress:
            type: string
          access: {}
        required:
        - access
        - id
        - name
        - type
        title: Client details
      - type: object
        properties:
          macAddress:
            type: string
          uplinkDeviceId:
            type: string
            format: uuid
          access:
            description: "Represents the type of network access and/or any applicable\
              \ authorization status the client is using.\n\n- **Wired clients** may\
              \ have direct access without additional authorization.\n- **Wireless\
              \ clients** can be connected via a protected network or an open network\n\
              \  that may require additional authorization (e.g., a guest portal).\n\
              - **VPN clients** may have different authorization mechanisms.\n\nCurrently,\
              \ the only two supported access types are `GUEST` (used for wired and\
              \ wireless guest clients)\nand `DEFAULT` (a placeholder, which might\
              \ be refined in the future releases, used for all other clients).\n\n\
              Filtering is possible by `access.type`, for example `access.type.eq('GUEST')`\
              \ to list guest clients."
            discriminator:
              propertyName: type
              mapping:
                DEFAULT: '#/components/schemas/DefaultClientAccessDetails'
                GUEST: '#/components/schemas/GuestAccessDetails'
            title: Local client access details
            oneOf:
            - $ref: '#/components/schemas/DefaultClientAccessDetails'
            - $ref: '#/components/schemas/GuestAccessDetails'
      required:
      - access
      - id
      - macAddress
      - name
      - uplinkDeviceId
