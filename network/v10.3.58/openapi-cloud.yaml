  /v1/sites/{siteId}/hotspot/vouchers/{voucherId}:
    get:
      tags:
      - Hotspot
      summary: Get Voucher Details
      description: Retrieve details of a specific Hotspot voucher.
      operationId: getVoucher
      parameters:
      - name: voucherId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  createdAt:
                    type: string
                    format: date-time
                  name:
                    type: string
                    description: Voucher note, may contain duplicate values across
                      multiple vouchers
                    example: hotel-guest
                  code:
                    type: string
                    description: Secret code to active the voucher using the Hotspot
                      portal
                    example: 4861409510
                  authorizedGuestLimit:
                    type: integer
                    format: int64
                    description: (Optional) limit for how many different guests can
                      use the same voucher to authorize network access
                    example: 1
                  authorizedGuestCount:
                    type: integer
                    format: int64
                    description: For how many guests the voucher has been used to
                      authorize network access
                    example: 0
                  activatedAt:
                    type: string
                    format: date-time
                    description: (Optional) timestamp when the voucher has been activated
                      (authorization time of the first guest)
                  expiresAt:
                    type: string
                    format: date-time
                    description: (Optional) timestamp when the voucher will become
                      expired. All guests using the voucher will be unauthorized from
                      network access
                  expired:
                    type: boolean
                    description: Whether the voucher has been expired and can no longer
                      be used to authorize network access
                  timeLimitMinutes:
                    type: integer
                    format: int64
                    description: 'How long (in minutes) the voucher will provide access
                      to the network since authorization of the first guest.

                      Subsequently connected guests, if allowed, will share the same
                      expiration time.'
                    example: 1440
                  dataUsageLimitMBytes:
                    type: integer
                    format: int64
                    description: (Optional) data usage limit in megabytes
                    example: 1024
                  rxRateLimitKbps:
                    type: integer
                    format: int64
                    description: (Optional) download rate limit in kilobits per second
                    example: 1000
                  txRateLimitKbps:
                    type: integer
                    format: int64
                    description: (Optional) upload rate limit in kilobits per second
                    example: 1000
                required:
                - authorizedGuestCount
                - code
                - createdAt
                - expired
                - id
                - name
                - timeLimitMinutes
                title: Hotspot voucher details
