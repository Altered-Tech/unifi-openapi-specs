  schemas:
    ErrorMessage:
      properties:
        statusCode:
          type: integer
          format: int32
          example: 400
        statusName:
          type: string
          example: UNAUTHORIZED
        code:
          type: string
          example: api.authentication.missing-credentials
        message:
          type: string
          example: Missing credentials
        timestamp:
          type: string
          format: date-time
          example: '2024-11-27T08:13:46.966Z'
        requestPath:
          type: string
          example: /integration/v1/sites/123
        requestId:
          type: string
          format: uuid
          description: In case of Internal Server Error (core = 500), request ID can
            be used to track down the error in the server log
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      x-tags: Error Handling
    BlackoutScheduleConfigurationPerDay:
      type: object
      discriminator:
        propertyName: type
        mapping:
          ALL_DAY: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerAllDayDto'
          TIME_RANGE: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerDayWithTimeRangeDto'
      properties:
        type:
          type: string
        day:
          type: string
          enum:
          - SUN
          - MON
          - TUE
          - WED
          - THU
          - FRI
          - SAT
      required:
      - day
      - type
    BroadcastingDeviceFilter:
      discriminator:
        propertyName: type
        mapping:
          DEVICES: '#/components/schemas/IntegrationWifiDevicesFilterDto'
          DEVICE_TAGS: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
      oneOf:
      - $ref: '#/components/schemas/IntegrationWifiDevicesFilterDto'
