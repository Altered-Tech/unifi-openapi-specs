      - Hotspot
      summary: Delete Voucher
      description: Remove a specific Hotspot voucher.
      operationId: deleteVoucher
      parameters:
      - name: voucherId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  vouchersDeleted:
                    type: integer
                    format: int64
                title: Voucher deletion results
