    IntegrationFirewallScheduleCustomDto:
      allOf:
      - description: Defines date and time when the entity is active. If null, the
          entity is always active.
        discriminator:
          propertyName: mode
          mapping:
            EVERY_DAY: '#/components/schemas/IntegrationFirewallScheduleEveryDayDto'
            EVERY_WEEK: '#/components/schemas/IntegrationFirewallScheduleEveryWeekDto'
            ONE_TIME_ONLY: '#/components/schemas/IntegrationFirewallScheduleOneTimeOnlyDto'
            CUSTOM: '#/components/schemas/IntegrationFirewallScheduleCustomDto'
        properties:
          mode:
            type: string
        required:
        - mode
        title: Firewall schedule
      - type: object
        properties:
          timeFilter:
            type: object
            description: Defines the time range when the entity is active. If null,
              the entity is active all day.
            properties:
              startTime:
                type: string
                description: Time in HH:MM format. Uses 24-hour clock system. ISO
                  8601 compliant.
                example: '21:37'
              stopTime:
                type: string
                description: Time in HH:MM format. Uses 24-hour clock system. ISO
                  8601 compliant.
                example: '21:37'
            required:
            - startTime
            - stopTime
