    CreateOrUpdateFirewallPolicy:
      type: object
      properties:
        enabled:
          type: boolean
        name:
          type: string
          example: My firewall policy
          minLength: 1
        description:
          type: string
          example: A description for my firewall policy
        action:
          description: Defines action for matched traffic.
          discriminator:
            propertyName: type
            mapping:
              ALLOW: '#/components/schemas/IntegrationFirewallPolicyActionAllowDto'
              BLOCK: '#/components/schemas/IntegrationFirewallPolicyActionBlockDto'
              REJECT: '#/components/schemas/IntegrationFirewallPolicyActionRejectDto'
          title: Firewall policy action
          oneOf:
          - $ref: '#/components/schemas/IntegrationFirewallPolicyActionAllowDto'
          - $ref: '#/components/schemas/IntegrationFirewallPolicyActionBlockDto'
          - $ref: '#/components/schemas/IntegrationFirewallPolicyActionRejectDto'
        source:
          type: object
          properties:
            zoneId:
              type: string
              format: uuid
              description: ID of the firewall zone from which the matched traffic
                originates.
            trafficFilter:
              discriminator:
                propertyName: type
                mapping:
                  PORT: '#/components/schemas/IntegrationFirewallPolicySourcePortFilterDto'
                  NETWORK: '#/components/schemas/IntegrationFirewallPolicySourceNetworkFilterDto'
                  MAC_ADDRESS: '#/components/schemas/IntegrationFirewallPolicySourceMacAddressFilterDto'
                  IP_ADDRESS: '#/components/schemas/IntegrationFirewallPolicySourceIpAddressFilterDto'
                  IPV6_IID: '#/components/schemas/IntegrationFirewallPolicySourceIpv6IidFilterDto'
                  REGION: '#/components/schemas/IntegrationFirewallPolicySourceRegionFilterDto'
                  VPN_SERVER: '#/components/schemas/IntegrationFirewallPolicySourceVpnServerFilterDto'
                  SITE_TO_SITE_VPN_TUNNEL: '#/components/schemas/IntegrationFirewallPolicySourceSiteToSiteVpnTunnelFilterDto'
              title: Firewall policy source traffic filter
              oneOf:
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourcePortFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceNetworkFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceMacAddressFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceIpAddressFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceIpv6IidFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceRegionFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceVpnServerFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicySourceSiteToSiteVpnTunnelFilterDto'
          required:
          - zoneId
          title: Firewall policy source
        destination:
          type: object
          properties:
            zoneId:
              type: string
              format: uuid
              description: ID of the firewall zone to which the matched traffic is
                destined.
            trafficFilter:
              discriminator:
                propertyName: type
                mapping:
                  PORT: '#/components/schemas/IntegrationFirewallPolicyDestinationPortFilterDto'
                  NETWORK: '#/components/schemas/IntegrationFirewallPolicyDestinationNetworkFilterDto'
                  IP_ADDRESS: '#/components/schemas/IntegrationFirewallPolicyDestinationIpAddressFilterDto'
                  IPV6_IID: '#/components/schemas/IntegrationFirewallPolicyDestinationIpv6IidFilterDto'
                  REGION: '#/components/schemas/IntegrationFirewallPolicyDestinationRegionFilterDto'
                  VPN_SERVER: '#/components/schemas/IntegrationFirewallPolicyDestinationVpnServerFilterDto'
                  SITE_TO_SITE_VPN_TUNNEL: '#/components/schemas/IntegrationFirewallPolicyDestinationSiteToSiteVpnTunnelFilterDto'
                  DOMAIN: '#/components/schemas/IntegrationFirewallPolicyDestinationDomainFilterDto'
                  APPLICATION: '#/components/schemas/IntegrationFirewallPolicyDestinationApplicationFilterDto'
                  APPLICATION_CATEGORY: '#/components/schemas/IntegrationFirewallPolicyDestinationApplicationCategoryFilterDto'
              title: Firewall policy destination traffic filter
              oneOf:
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationPortFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationNetworkFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationIpAddressFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationIpv6IidFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationRegionFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationVpnServerFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationSiteToSiteVpnTunnelFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationDomainFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationApplicationFilterDto'
              - $ref: '#/components/schemas/IntegrationFirewallPolicyDestinationApplicationCategoryFilterDto'
          required:
          - zoneId
          title: Firewall policy destination
        ipProtocolScope:
          description: Defines rules for matching by IP version and protocol.
          discriminator:
            propertyName: ipVersion
            mapping:
              IPV4: '#/components/schemas/IntegrationFirewallPolicyIpv4ProtocolScopeDto'
              IPV6: '#/components/schemas/IntegrationFirewallPolicyIpv6ProtocolScopeDto'
              IPV4_AND_IPV6: '#/components/schemas/IntegrationFirewallPolicyIpv4AndIpv6ProtocolScopeDto'
          title: Firewall policy IP protocol scope
          oneOf:
          - $ref: '#/components/schemas/IntegrationFirewallPolicyIpv4ProtocolScopeDto'
          - $ref: '#/components/schemas/IntegrationFirewallPolicyIpv6ProtocolScopeDto'
          - $ref: '#/components/schemas/IntegrationFirewallPolicyIpv4AndIpv6ProtocolScopeDto'
        connectionStateFilter:
          type: array
          description: Match on firewall connection state. If null, matches all connection
            states.
          items:
            type: string
            enum:
            - NEW
            - INVALID
            - ESTABLISHED
            - RELATED
          maxItems: 2147483647
          minItems: 1
          uniqueItems: true
        ipsecFilter:
          type: string
          description: Match on traffic encrypted, or not encrypted by IPsec. If null,
            matches all traffic.
          enum:
          - MATCH_ENCRYPTED
          - MATCH_NOT_ENCRYPTED
        loggingEnabled:
          type: boolean
          description: Generate syslog entries when traffic is matched. Such entries
            are sent to a remote syslog server.
        schedule:
          description: Defines date and time when the entity is active. If null, the
            entity is always active.
          discriminator:
            propertyName: mode
            mapping:
              EVERY_DAY: '#/components/schemas/IntegrationFirewallScheduleEveryDayDto'
              EVERY_WEEK: '#/components/schemas/IntegrationFirewallScheduleEveryWeekDto'
              ONE_TIME_ONLY: '#/components/schemas/IntegrationFirewallScheduleOneTimeOnlyDto'
              CUSTOM: '#/components/schemas/IntegrationFirewallScheduleCustomDto'
          title: Firewall schedule
          oneOf:
          - $ref: '#/components/schemas/IntegrationFirewallScheduleEveryDayDto'
          - $ref: '#/components/schemas/IntegrationFirewallScheduleEveryWeekDto'
          - $ref: '#/components/schemas/IntegrationFirewallScheduleOneTimeOnlyDto'
          - $ref: '#/components/schemas/IntegrationFirewallScheduleCustomDto'
      required:
      - action
      - destination
      - enabled
      - ipProtocolScope
      - loggingEnabled
      - name
      - source
