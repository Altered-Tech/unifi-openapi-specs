      - type: object
        properties:
          isolationEnabled:
            type: boolean
            description: Whether this network is isolated from all other networks.
          cellularBackupEnabled:
            type: boolean
            description: Whether this network is allowed to use cellular data when
              WAN connection(s) are down.
          deviceId:
            type: string
            format: uuid
            description: ID of the L3 switching capable device that manages this network.
          ipv4Configuration:
            description: Details about IPv4 configuration for this Network.
            type: object
            properties:
              autoScaleEnabled:
                type: boolean
                description: Whether the Network can automatically scale its subnet
                  size based on the number of active DHCP leases.
              hostIpAddress:
                type: string
              prefixLength:
                type: integer
                format: int32
                maximum: 30
                minimum: 8
              additionalHostIpSubnets:
                type: array
                description: Additional host IP subnets assigned to this VLAN.
                items:
                  type: string
                maxItems: 64
                minItems: 1
              dhcpConfiguration:
                description: IPv4 DHCP configuration for this network. If this field
                  is omitted or null, DHCP is not working and hosts must get an address
                  statically or from another server in this broadcast domain.
                discriminator:
                  propertyName: mode
                  mapping:
                    SERVER: '#/components/schemas/IPv4DHCPServerConfiguration'
                    RELAY: '#/components/schemas/IPv4DHCPRelayConfiguration'
                title: Switch Managed IPv4 DHCP Configuration
                oneOf:
                - $ref: '#/components/schemas/IPv4DHCPServerConfiguration'
                - $ref: '#/components/schemas/IPv4DHCPRelayConfiguration'
            required:
            - autoScaleEnabled
            - hostIpAddress
            - prefixLength
            title: Switch Managed IPv4 Configuration
      required:
      - cellularBackupEnabled
      - default
      - deviceId
      - enabled
      - id
      - ipv4Configuration
      - isolationEnabled
      - metadata
      - name
      - vlanId
