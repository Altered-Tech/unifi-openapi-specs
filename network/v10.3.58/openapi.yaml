    FirewallSchedule:
      description: Defines date and time when the entity is active. If null, the entity
        is always active.
      discriminator:
        mapping:
          CUSTOM: '#/components/schemas/IntegrationFirewallScheduleCustomDto'
          EVERY_DAY: '#/components/schemas/IntegrationFirewallScheduleEveryDayDto'
          EVERY_WEEK: '#/components/schemas/IntegrationFirewallScheduleEveryWeekDto'
          ONE_TIME_ONLY: '#/components/schemas/IntegrationFirewallScheduleOneTimeOnlyDto'
        propertyName: mode
      oneOf:
      - $ref: '#/components/schemas/IntegrationFirewallScheduleCustomDto'
      - $ref: '#/components/schemas/IntegrationFirewallScheduleEveryDayDto'
      - $ref: '#/components/schemas/IntegrationFirewallScheduleEveryWeekDto'
      - $ref: '#/components/schemas/IntegrationFirewallScheduleOneTimeOnlyDto'
    FirewallScheduleTime:
      description: Defines the time range when the entity is active. If null, the
        entity is active all day.
      properties:
        startTime:
          description: Time in HH:MM format. Uses 24-hour clock system. ISO 8601 compliant.
          example: '21:37'
          type: string
        stopTime:
          description: Time in HH:MM format. Uses 24-hour clock system. ISO 8601 compliant.
          example: '21:37'
          type: string
      required:
      - startTime
      - stopTime
      type: object
    FirewallZone:
      properties:
        id:
          example: ffcdb32c-6278-4364-8947-df4f77118df8
          format: uuid
          type: string
        metadata:
          $ref: '#/components/schemas/UserOrSystemDefinedEntityMetadata'
          description: System-defined configurable zones support configuring only
            attached networks
        name:
          description: Name of a firewall zone
          example: Hotspot|My custom zone
          type: string
        networkIds:
          description: List of Network IDs
          items:
            example: dfb21062-8ea0-4dca-b1d8-1eb3da00e58b
            format: uuid
            type: string
          minItems: 0
          type: array
      required:
      - id
      - metadata
      - name
      - networkIds
      type: object
    FirewallZonesPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/FirewallZone'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    GatewayManagedIPv4Configuration:
      properties:
        additionalHostIpSubnets:
          description: Additional host IP subnets assigned to this VLAN.
          items:
            type: string
          maxItems: 64
          minItems: 1
          type: array
        autoScaleEnabled:
          description: Whether the Network can automatically scale its subnet size
            based on the number of active DHCP leases.
          type: boolean
        dhcpConfiguration:
          $ref: '#/components/schemas/GatewayManagedIPv4DHCPConfiguration'
          description: IPv4 DHCP configuration for this network. If this field is
            omitted or null, DHCP is not working and hosts must get an address statically
            or from another server in this broadcast domain.
        hostIpAddress:
          type: string
        natOutboundIpAddressConfiguration:
          description: List of NAT Outbound Configurations defining which IP addresses
            are used for NAT translation. This array must contain all WAN interfaces
            with `static` or `PPPoE` IPv4 connection configuration.
          items:
            $ref: '#/components/schemas/WANNATOutboundConfiguration'
          maxItems: 2147483647
          minItems: 1
          type: array
        prefixLength:
          format: int32
          maximum: 30
          minimum: 8
          type: integer
      required:
      - autoScaleEnabled
      - hostIpAddress
      - prefixLength
      type: object
    GatewayManagedIPv4DHCPConfiguration:
      discriminator:
        mapping:
          RELAY: '#/components/schemas/IPv4DHCPRelayConfiguration'
          SERVER: '#/components/schemas/GatewayManagedIPv4DHCPServerConfiguration'
        propertyName: mode
      oneOf:
      - $ref: '#/components/schemas/IPv4DHCPRelayConfiguration'
      - $ref: '#/components/schemas/GatewayManagedIPv4DHCPServerConfiguration'
    GatewayManagedIPv4DHCPServerConfiguration:
      allOf:
      - $ref: '#/components/schemas/GatewayManagedIPv4DHCPConfiguration'
      - properties:
          dnsServerIpAddressesOverride:
            description: List of DNS servers assigned to client devices by the DHCP
              server. If none are specified, they will be selected automatically.
            items:
              type: string
            maxItems: 4
            minItems: 1
            type: array
          domainName:
            description: Domain name that can be used to access network in the browser.
            type: string
          gatewayIpAddressOverride:
            description: Gateway IP address provided to DHCP clients. If null, the
              default gateway will be assigned.
            type: string
          ipAddressRange:
            $ref: '#/components/schemas/IPAddressRange'
          leaseTimeSeconds:
            description: The lease time in seconds for addresses in this range.
            format: int32
            maximum: 31536000
            minimum: 0
            type: integer
          ntpServerIpAddresses:
            description: Network Time Protocol (NTP) server IP addresses.
            items:
              type: string
            maxItems: 2
            minItems: 1
            type: array
          option43Value:
            description: Custom DHCP option (43) — the value MUST be the UniFi Network
              application's host IP address.
            type: string
          pingConflictDetectionEnabled:
            type: boolean
          pxeConfiguration:
            $ref: '#/components/schemas/PXEConfiguration'
            description: Pre execution environment configuration for network boot
          tftpServerAddress:
            description: Trivial File Transfer Protocol (TFTP) server address — accepts
              a hostname, URL or IP address.
            type: string
          timeOffsetSeconds:
            description: Time offset in seconds from UTC.
            format: int32
            maximum: 86400
            minimum: -86400
            type: integer
          winsServerIpAddresses:
            description: Windows Internet Name Service (WINS) server IP addresses.
            items:
              type: string
            maxItems: 2
            minItems: 1
            type: array
          wpadUrl:
            description: Web Proxy Auto-Discovery (WPAD) URL.
            type: string
        type: object
      required:
      - ipAddressRange
      - leaseTimeSeconds
      - pingConflictDetectionEnabled
    GatewayManagedNetworkDetails:
      allOf:
      - $ref: '#/components/schemas/NetworkDetails'
      - properties:
          cellularBackupEnabled:
            description: Whether this network is allowed to use cellular data when
              WAN connection(s) are down.
            type: boolean
          internetAccessEnabled:
            description: Whether the internet access is allowed for the device on
              this network.
            type: boolean
          ipv4Configuration:
            $ref: '#/components/schemas/GatewayManagedIPv4Configuration'
            description: Details about IPv4 configuration for this Network.
          ipv6Configuration:
            $ref: '#/components/schemas/NetworkIPv6Configuration'
            description: Details about IPv6 configuration for this Network. If this
              field is omitted or null then IPv6 is not configured on this Network.
          isolationEnabled:
            description: Whether this network is isolated from all other networks.
            type: boolean
          mdnsForwardingEnabled:
            description: Whether this network should participate in mDNS traffic forwarding.
            type: boolean
          zoneId:
            description: Firewall zone ID associated with this Network.
            format: uuid
            type: string
        type: object
      required:
      - cellularBackupEnabled
      - default
      - enabled
      - id
      - internetAccessEnabled
      - ipv4Configuration
      - isolationEnabled
      - mdnsForwardingEnabled
      - metadata
      - name
      - vlanId
    GatewayManagedNetworkOverview:
      allOf:
      - $ref: '#/components/schemas/NetworkOverview'
      - properties:
          zoneId:
            format: uuid
            type: string
        type: object
      required:
      - default
      - enabled
      - id
      - metadata
      - name
      - vlanId
    GuestAccessAuthorizationRequest:
      allOf:
      - $ref: '#/components/schemas/ClientActionRequest'
      - properties:
          dataUsageLimitMBytes:
            description: (Optional) data usage limit in megabytes
            format: int64
            maximum: 1048576
            minimum: 1
            type: integer
          rxRateLimitKbps:
            description: (Optional) download rate limit in kilobits per second
            format: int64
            maximum: 100000
            minimum: 2
            type: integer
          timeLimitMinutes:
            description: '(Optional) how long (in minutes) the guest will be authorized
              to access the network.

              If not specified, the default limit is used from the site settings'
            format: int64
            maximum: 1000000
            minimum: 1
            type: integer
          txRateLimitKbps:
            description: (Optional) upload rate limit in kilobits per second
            format: int64
            maximum: 100000
            minimum: 2
            type: integer
        type: object
      description: 'Authorizes network access to a guest client. Client must be a
        guest.

        This action cancels existing active authorization (if exists), creates a new
        one with new limits

        and resets guest traffic counters.'
    GuestAccessAuthorizationResponse:
      allOf:
      - $ref: '#/components/schemas/ClientActionResponse'
      - properties:
          grantedAuthorization:
            $ref: '#/components/schemas/GuestAuthorizationDetails'
            description: Granted guest authorization
          revokedAuthorization:
            $ref: '#/components/schemas/GuestAuthorizationDetails'
            description: (Optional) Revoked authorization in case the guest was already
              authorized at the time of this request
        type: object
      required:
      - grantedAuthorization
    GuestAccessDetails:
      allOf:
      - $ref: '#/components/schemas/LocalClientAccessDetails'
      - properties:
          authorization:
            $ref: '#/components/schemas/GuestAuthorizationDetails'
          authorized:
            type: boolean
        type: object
      required:
      - authorized
    GuestAccessOverview:
      allOf:
      - $ref: '#/components/schemas/LocalClientAccessOverview'
      - properties:
          authorized:
            type: boolean
        type: object
      required:
      - authorized
    GuestAccessUnauthorizationRequest:
      allOf:
      - $ref: '#/components/schemas/ClientActionRequest'
      description: Unauthorizes network access and disconnects a guest client.
    GuestAccessUnauthorizationResponse:
      allOf:
      - $ref: '#/components/schemas/ClientActionResponse'
      - properties:
          revokedAuthorization:
            $ref: '#/components/schemas/GuestAuthorizationDetails'
            description: Revoked guest authorization
        type: object
      required:
      - revokedAuthorization
    GuestAuthorizationDetails:
      properties:
        authorizationMethod:
          description: Guest authorization method (API, Voucher etc)
          enum:
          - VOUCHER
          - API
          - OTHER
          type: string
        authorizedAt:
          description: Timestamp when the guest has been authorized
          format: date-time
          type: string
        dataUsageLimitMBytes:
          description: (Optional) data usage limit in megabytes
          example: 1024
          format: int64
          type: integer
        expiresAt:
          description: Timestamp when the guest will get automatically unauthorized
          format: date-time
          type: string
        rxRateLimitKbps:
          description: (Optional) download rate limit in kilobits per second
          example: 1000
          format: int64
          type: integer
        txRateLimitKbps:
          description: (Optional) upload rate limit in kilobits per second
          example: 1000
          format: int64
          type: integer
        usage:
          $ref: '#/components/schemas/GuestAuthorizationUsageDetails'
      required:
      - authorizationMethod
      - authorizedAt
      - expiresAt
      type: object
    GuestAuthorizationUsageDetails:
      properties:
        bytes:
          format: int64
          type: integer
        durationSec:
          format: int64
          type: integer
        rxBytes:
          format: int64
          type: integer
        txBytes:
          format: int64
          type: integer
      required:
      - bytes
      - durationSec
      - rxBytes
      - txBytes
      type: object
    HotspotVoucherCreationRequest:
      properties:
        authorizedGuestLimit:
          description: (Optional) limit for how many different guests can use the
            same voucher to authorize network access
          example: 1
          format: int64
          minimum: 1
          type: integer
        count:
          default: 1
          description: Number of vouchers to generate
          format: int32
          maximum: 1000
          minimum: 1
          type: integer
        dataUsageLimitMBytes:
          description: (Optional) data usage limit in megabytes
          format: int64
          maximum: 1048576
          minimum: 1
          type: integer
        name:
          description: Voucher note, duplicated across all generated vouchers
          minLength: 1
          type: string
        rxRateLimitKbps:
          description: (Optional) download rate limit in kilobits per second
          format: int64
          maximum: 100000
          minimum: 2
          type: integer
        timeLimitMinutes:
          description: 'How long (in minutes) the voucher will provide access to the
            network since authorization of the first guest.

            Subsequently connected guests, if allowed, will share the same expiration
            time.'
          format: int64
          maximum: 1000000
          minimum: 1
          type: integer
        txRateLimitKbps:
          description: (Optional) upload rate limit in kilobits per second
          format: int64
          maximum: 100000
          minimum: 2
          type: integer
      required:
      - name
      - timeLimitMinutes
      type: object
    HotspotVoucherDetailPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/HotspotVoucherDetails'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    HotspotVoucherDetails:
      properties:
        activatedAt:
          description: (Optional) timestamp when the voucher has been activated (authorization
            time of the first guest)
          format: date-time
          type: string
        authorizedGuestCount:
          description: For how many guests the voucher has been used to authorize
            network access
          example: 0
          format: int64
          type: integer
        authorizedGuestLimit:
          description: (Optional) limit for how many different guests can use the
            same voucher to authorize network access
          example: 1
          format: int64
          type: integer
        code:
          description: Secret code to active the voucher using the Hotspot portal
          example: 4861409510
          type: string
        createdAt:
          format: date-time
          type: string
        dataUsageLimitMBytes:
          description: (Optional) data usage limit in megabytes
          example: 1024
          format: int64
          type: integer
        expired:
          description: Whether the voucher has been expired and can no longer be used
            to authorize network access
          type: boolean
        expiresAt:
          description: (Optional) timestamp when the voucher will become expired.
            All guests using the voucher will be unauthorized from network access
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        name:
          description: Voucher note, may contain duplicate values across multiple
            vouchers
          example: hotel-guest
          type: string
        rxRateLimitKbps:
          description: (Optional) download rate limit in kilobits per second
          example: 1000
          format: int64
          type: integer
        timeLimitMinutes:
          description: 'How long (in minutes) the voucher will provide access to the
            network since authorization of the first guest.

            Subsequently connected guests, if allowed, will share the same expiration
            time.'
          example: 1440
          format: int64
          type: integer
        txRateLimitKbps:
          description: (Optional) upload rate limit in kilobits per second
          example: 1000
          format: int64
          type: integer
      required:
      - authorizedGuestCount
      - code
      - createdAt
      - expired
      - id
      - name
      - timeLimitMinutes
      type: object
    IPACLRuleEndpoint:
