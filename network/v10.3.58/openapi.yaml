components:
  schemas:
    ACLRule:
      discriminator:
        mapping:
          IPV4: '#/components/schemas/IntegrationIpAclRuleDto'
          MAC: '#/components/schemas/IntegrationMacAclRuleDto'
        propertyName: type
      properties:
        action:
          description: ACL rule action
          enum:
          - ALLOW
          - BLOCK
          example: ALLOW|BLOCK
          type: string
        description:
          description: ACL rule description
          type: string
        destinationFilter:
          description: Traffic destination filter
        enabled:
          example: true
          type: boolean
        enforcingDeviceFilter:
          $ref: '#/components/schemas/ACLRuleDeviceFilter'
          description: IDs of the Switch-capable devices used to enforce the ACL rule.
            When null, the rule will be provisioned to all switches on the site.
        id:
          format: uuid
          type: string
        index:
          description: ACL rule index. Lower index has higher priority
          format: int32
          minimum: 0
          type: integer
        metadata:
          $ref: '#/components/schemas/UserDefinedOrDerivedEntityMetadata'
          description: Only user-defined rules can be deleted or modified
        name:
          description: ACL rule name
          minLength: 1
          type: string
        sourceFilter:
          description: Traffic source filter
        type:
          type: string
      required:
      - action
      - enabled
      - id
      - index
      - metadata
      - name
      - type
      type: object
    ACLRuleDeviceFilter:
      discriminator:
        mapping:
          DEVICES: '#/components/schemas/IntegrationAclRuleDevicesFilterDto'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/IntegrationAclRuleDevicesFilterDto'
    ACLRuleOrdering:
      properties:
        orderedAclRuleIds:
          items:
            format: uuid
            type: string
          type: array
      required:
      - orderedAclRuleIds
      type: object
    ACLRuleUpdate:
      discriminator:
        mapping:
          IPV4: '#/components/schemas/IntegrationIpAclRuleCreateUpdateDto'
          MAC: '#/components/schemas/IntegrationMacAclRuleCreateUpdateDto'
        propertyName: type
      properties:
        action:
          description: ACL rule action
          enum:
          - ALLOW
          - BLOCK
          example: ALLOW|BLOCK
          type: string
        description:
          description: ACL rule description
          type: string
        destinationFilter:
          description: Traffic destination filter
        enabled:
          example: true
          type: boolean
        enforcingDeviceFilter:
          $ref: '#/components/schemas/ACLRuleDeviceFilter'
          description: IDs of the Switch-capable devices used to enforce the ACL rule.
            When null, the rule will be provisioned to all switches on the site.
        index:
          deprecated: true
          description: ACL rule index. This property is deprecated and has no effect.
            Use the dedicated ACL rule reordering endpoint.
          format: int32
          minimum: 0
          type: integer
        name:
          description: ACL rule name
          minLength: 1
          type: string
        sourceFilter:
          description: Traffic source filter
        type:
          type: string
      required:
      - action
      - enabled
      - name
      - type
      type: object
    ACLRuleObject:
      discriminator:
        mapping:
          IPV4: '#/components/schemas/IntegrationIpAclRuleDto'
          MAC: '#/components/schemas/IntegrationMacAclRuleDto'
        propertyName: type
      properties:
        action:
          description: ACL rule action
          enum:
          - ALLOW
          - BLOCK
          example: ALLOW|BLOCK
          type: string
        description:
          description: ACL rule description
          type: string
        destinationFilter:
          description: Traffic destination filter
        enabled:
          example: true
          type: boolean
        enforcingDeviceFilter:
          $ref: '#/components/schemas/ACLRuleDeviceFilter'
          description: IDs of the Switch-capable devices used to enforce the ACL rule.
            When null, the rule will be provisioned to all switches on the site.
        id:
          format: uuid
          type: string
        index:
          description: ACL rule index. Lower index has higher priority
          format: int32
          minimum: 0
          type: integer
        metadata:
          $ref: '#/components/schemas/UserDefinedOrDerivedEntityMetadata'
          description: Only user-defined rules can be deleted or modified
        name:
          description: ACL rule name
          minLength: 1
          type: string
        sourceFilter:
          description: Traffic source filter
        type:
          type: string
      required:
      - action
      - enabled
      - id
      - index
      - metadata
      - name
      - type
      type: object
    AccessPointFeatureOverview: {}
    AddressIPv4Matching:
      allOf:
      - $ref: '#/components/schemas/IPv4Matching'
      - properties:
          value:
            description: IPv4 address
            example: 192.168.1.5
            type: string
        type: object
      required:
      - value
    AddressIPv6Matching:
      allOf:
      - $ref: '#/components/schemas/IPv6Matching'
      - properties:
          value:
            description: IPv6 address
            example: 2001:0db8:85a3:0000:0000:8a2e:0370:7334
            type: string
        type: object
      required:
      - value
    AddressRangeIPv4Matching:
      allOf:
      - $ref: '#/components/schemas/IPv4Matching'
      - properties:
          start:
            description: IPv4 start address
            example: 192.168.1.10
            type: string
          stop:
            description: IPv4 stop address
            example: 192.168.1.20
            type: string
        type: object
      required:
      - start
      - stop
    AdoptedDeviceDetails:
      properties:
        adoptedAt:
          format: date-time
          type: string
        configurationId:
          example: 7596498d2f367dc2
          type: string
        features:
          $ref: '#/components/schemas/DeviceFeatures'
        firmwareUpdatable:
          type: boolean
        firmwareVersion:
          example: 6.6.55
          type: string
        id:
          format: uuid
          type: string
        interfaces:
          $ref: '#/components/schemas/DevicePhysicalInterfaces'
        ipAddress:
          example: 192.168.1.55
          type: string
        macAddress:
          example: 94:2a:6f:26:c6:ca
          type: string
        model:
          example: UHDIW
          type: string
        name:
          example: IW HD
          type: string
        provisionedAt:
          format: date-time
          type: string
        state:
          enum:
          - ONLINE
          - OFFLINE
          - PENDING_ADOPTION
          - UPDATING
          - GETTING_READY
          - ADOPTING
          - DELETING
          - CONNECTION_INTERRUPTED
          - ISOLATED
          - U5G_INCORRECT_TOPOLOGY
          type: string
        supported:
          type: boolean
        uplink:
          $ref: '#/components/schemas/DeviceUplinkInterfaceOverview'
      required:
      - configurationId
      - features
      - firmwareUpdatable
      - id
      - interfaces
      - ipAddress
      - macAddress
      - model
      - name
      - state
      - supported
      type: object
    AdoptedDeviceOverview:
      properties:
        features:
          items:
            enum:
            - switching
            - accessPoint
            - gateway
            type: string
          type: array
          uniqueItems: true
        firmwareUpdatable:
          type: boolean
        firmwareVersion:
          example: 6.6.55
          type: string
        id:
          format: uuid
          type: string
        interfaces:
          items:
            enum:
            - ports
            - radios
            type: string
          type: array
          uniqueItems: true
        ipAddress:
          example: 192.168.1.55
          type: string
        macAddress:
          example: 94:2a:6f:26:c6:ca
          type: string
        model:
          example: UHDIW
          type: string
        name:
          example: IW HD
          type: string
        state:
          enum:
          - ONLINE
          - OFFLINE
          - PENDING_ADOPTION
          - UPDATING
          - GETTING_READY
          - ADOPTING
          - DELETING
          - CONNECTION_INTERRUPTED
          - ISOLATED
          - U5G_INCORRECT_TOPOLOGY
          type: string
        supported:
          type: boolean
      required:
      - features
      - firmwareUpdatable
      - id
      - interfaces
      - ipAddress
      - macAddress
      - model
      - name
      - state
      - supported
      type: object
    AdoptedDeviceOverviewPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/AdoptedDeviceOverview'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    ApplicationInfo:
      properties:
        applicationVersion:
          example: 9.1.0
          type: string
      required:
      - applicationVersion
      type: object
    BlackoutScheduleConfigurationPerDay:
      discriminator:
        mapping:
          ALL_DAY: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerAllDayDto'
          TIME_RANGE: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerDayWithTimeRangeDto'
        propertyName: type
      properties:
        day:
          enum:
          - SUN
          - MON
          - TUE
          - WED
          - THU
          - FRI
          - SAT
          type: string
        type:
          type: string
      required:
      - day
      - type
      type: object
    BooleanType:
      allOf:
      - $ref: '#/components/schemas/ScalarType'
    BroadcastingDeviceFilter:
      discriminator:
        mapping:
          DEVICES: '#/components/schemas/IntegrationWifiDevicesFilterDto'
          DEVICE_TAGS: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/IntegrationWifiDevicesFilterDto'
      - $ref: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
    ClientAccessOverview:
      example:
        type: DEFAULT
    ClientActionRequest:
      discriminator:
        mapping:
          AUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessAuthorizationRequest'
          UNAUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessUnauthorizationRequest'
        propertyName: action
      oneOf:
      - $ref: '#/components/schemas/GuestAccessAuthorizationRequest'
      - $ref: '#/components/schemas/GuestAccessUnauthorizationRequest'
    ClientActionResponse:
      discriminator:
        mapping:
          AUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessAuthorizationResponse'
          UNAUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessUnauthorizationResponse'
        propertyName: action
      oneOf:
      - $ref: '#/components/schemas/GuestAccessAuthorizationResponse'
      - $ref: '#/components/schemas/GuestAccessUnauthorizationResponse'
    ClientDetails:
      discriminator:
        mapping:
          TELEPORT: '#/components/schemas/TeleportClientConnectionDetails'
          VPN: '#/components/schemas/VPNClientConnectionDetails'
          WIRED: '#/components/schemas/WiredClientDetails'
          WIRELESS: '#/components/schemas/WirelessClientDetails'
        propertyName: type
      properties:
        access: {}
        connectedAt:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        ipAddress:
          type: string
        name:
          type: string
        type:
          type: string
      required:
      - access
      - id
      - name
      - type
      type: object
    ClientOverview:
      discriminator:
        mapping:
          TELEPORT: '#/components/schemas/TeleportClientConnectionOverview'
          VPN: '#/components/schemas/VPNClientConnectionOverview'
          WIRED: '#/components/schemas/WiredClientOverview'
          WIRELESS: '#/components/schemas/WirelessClientOverview'
        propertyName: type
      properties:
        access:
          $ref: '#/components/schemas/ClientAccessOverview'
        connectedAt:
          format: date-time
          type: string
        id:
          format: uuid
          type: string
        ipAddress:
          type: string
        name:
          type: string
        type:
          type: string
      required:
      - access
      - id
      - name
      - type
      type: object
    ClientOverviewPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/ClientOverview'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    CompoundFilterExpression:
      allOf:
      - $ref: '#/components/schemas/FilterExpression'
      - properties:
          expressions:
            items: {}
            type: array
          operator:
            enum:
            - AND
            - OR
            - NOT
            type: string
        type: object
    CountryDefinition:
      properties:
        code:
          description: The country code in ISO 3166-1 alpha-2 format.
          example: CK|FK|KY
          type: string
        name:
          description: The country name.
          example: Cook Islands|Falkland Islands, Malvinas|Cayman Islands
          type: string
      required:
      - code
      - name
      type: object
    CountryDefinitionPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/CountryDefinition'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    CreateOrUpdateDNSPolicy:
      discriminator:
        mapping:
          AAAA_RECORD: '#/components/schemas/IntegrationDnsAaaaRecordCreateUpdateDto'
          A_RECORD: '#/components/schemas/IntegrationDnsARecordCreateUpdateDto'
          CNAME_RECORD: '#/components/schemas/IntegrationDnsCnameRecordCreateUpdateDto'
          FORWARD_DOMAIN: '#/components/schemas/IntegrationDnsForwardDomainPolicyCreateUpdateDto'
          MX_RECORD: '#/components/schemas/IntegrationDnsMxRecordCreateUpdateDto'
          SRV_RECORD: '#/components/schemas/IntegrationDnsSrvRecordCreateUpdateDto'
          TXT_RECORD: '#/components/schemas/IntegrationDnsTxtRecordCreateUpdateDto'
        propertyName: type
      properties:
        enabled:
          type: boolean
        type:
          type: string
      required:
      - enabled
      - type
      type: object
    CreateOrUpdateNetwork:
      discriminator:
        mapping:
          GATEWAY: '#/components/schemas/IntegrationGatewayManagedNetworkCreateUpdateDto'
          SWITCH: '#/components/schemas/IntegrationSwitchManagedNetworkCreateUpdateDto'
          UNMANAGED: '#/components/schemas/IntegrationUnmanagedNetworkCreateUpdateDto'
        propertyName: management
      properties:
        dhcpGuarding:
          $ref: '#/components/schemas/NetworkDHCPGuarding'
          description: DHCP Guarding settings for this Network. If this field is omitted
            or null, the feature is disabled
        enabled:
          type: boolean
        management:
          type: string
        name:
          example: Default Network
          type: string
        vlanId:
          description: VLAN ID. Must be 1 for the default network and >= 2 for additional
            networks.
          format: int32
          maximum: 4009
          minimum: 1
          type: integer
      required:
      - enabled
      - management
      - name
      - vlanId
      type: object
    CreateOrUpdateFirewallPolicy:
      properties:
        action:
          $ref: '#/components/schemas/FirewallPolicyAction'
        connectionStateFilter:
          description: Match on firewall connection state. If null, matches all connection
            states.
          items:
            enum:
            - NEW
            - INVALID
            - ESTABLISHED
            - RELATED
            type: string
          maxItems: 2147483647
          minItems: 1
          type: array
          uniqueItems: true
        description:
          example: A description for my firewall policy
          type: string
        destination:
          $ref: '#/components/schemas/FirewallPolicyDestination'
        enabled:
          type: boolean
        ipProtocolScope:
          $ref: '#/components/schemas/FirewallPolicyIPProtocolScope'
        ipsecFilter:
          description: Match on traffic encrypted, or not encrypted by IPsec. If null,
            matches all traffic.
          enum:
          - MATCH_ENCRYPTED
          - MATCH_NOT_ENCRYPTED
          type: string
        loggingEnabled:
          description: Generate syslog entries when traffic is matched. Such entries
            are sent to a remote syslog server.
          type: boolean
        name:
          example: My firewall policy
          minLength: 1
          type: string
        schedule:
          $ref: '#/components/schemas/FirewallSchedule'
        source:
          $ref: '#/components/schemas/FirewallPolicySource'
      required:
      - action
      - destination
      - enabled
      - ipProtocolScope
      - loggingEnabled
      - name
      - source
      type: object
    CreateOrUpdateFirewallZone:
      properties:
        name:
          description: Name of a firewall zone
          example: Hotspot|My custom zone
          type: string
        networkIds:
          description: List of Network IDs
          items:
            example: dfb21062-8ea0-4dca-b1d8-1eb3da00e58b
            format: uuid
            type: string
          minItems: 0
          type: array
      required:
      - name
      - networkIds
      type: object
    CreateOrUpdateTrafficMatchingList:
      discriminator:
        mapping:
          IPV4_ADDRESSES: '#/components/schemas/IntegrationIpV4TrafficMatchingListCreateUpdateDto'
          IPV6_ADDRESSES: '#/components/schemas/IntegrationIpV6TrafficMatchingListCreateUpdateDto'
          PORTS: '#/components/schemas/IntegrationPortTrafficMatchingListCreateUpdateDto'
        propertyName: type
      properties:
        name:
          example: Allowed port list|Protected IP list
          minLength: 1
          type: string
        type:
          type: string
      required:
      - name
      - type
      type: object
    DHCPConfigurationForIPv6Network:
      properties:
        ipAddressSuffixRange:
          $ref: '#/components/schemas/IntegrationIpv6AddressSuffixRangeSelectorDto'
        leaseTimeSeconds:
          description: The lease time in seconds for IP addresses in this range.
          format: int32
          maximum: 31536000
          minimum: 0
          type: integer
      required:
      - ipAddressSuffixRange
      - leaseTimeSeconds
      type: object
    DNSAssistanceConfiguration:
      discriminator:
        mapping:
          AUTO: '#/components/schemas/IntegrationWifiDnsAssistanceAutoConfigurationDto'
          MANUAL: '#/components/schemas/IntegrationWifiDnsAssistanceManualConfigurationDto'
        propertyName: mode
      oneOf:
      - $ref: '#/components/schemas/IntegrationWifiDnsAssistanceAutoConfigurationDto'
      - $ref: '#/components/schemas/IntegrationWifiDnsAssistanceManualConfigurationDto'
    DNSPolicy:
      discriminator:
        mapping:
          AAAA_RECORD: '#/components/schemas/IntegrationDnsAaaaRecordDto'
          A_RECORD: '#/components/schemas/IntegrationDnsARecordDto'
          CNAME_RECORD: '#/components/schemas/IntegrationDnsCnameRecordDto'
          FORWARD_DOMAIN: '#/components/schemas/IntegrationDnsForwardDomainPolicyDto'
          MX_RECORD: '#/components/schemas/IntegrationDnsMxRecordDto'
          SRV_RECORD: '#/components/schemas/IntegrationDnsSrvRecordDto'
          TXT_RECORD: '#/components/schemas/IntegrationDnsTxtRecordDto'
        propertyName: type
      properties:
        domain:
          type: string
        enabled:
          type: boolean
        id:
          format: uuid
          type: string
        metadata:
          $ref: '#/components/schemas/UserDefinedEntityMetadata'
        type:
          type: string
      required:
      - enabled
      - id
      - metadata
      - type
      type: object
    DPIApplication:
      properties:
        id:
          example: 786435|720973
          format: int32
          type: integer
        name:
          example: Adobe Express|Zoom
          type: string
      required:
      - id
      - name
      type: object
    DPIApplicationPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/DPIApplication'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    DPICategory:
      properties:
        id:
          example: 3|5
          format: int32
          type: integer
        name:
          example: Network protocols|Business tools
          type: string
      required:
      - id
      - name
      type: object
    DPICategoryPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/DPICategory'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    DecimalType:
      allOf:
      - $ref: '#/components/schemas/ScalarType'
    DefaultClientAccessDetails:
      allOf:
      - $ref: '#/components/schemas/LocalClientAccessDetails'
      - $ref: '#/components/schemas/VPNClientAccessDetails'
      - $ref: '#/components/schemas/TeleportClientAccessDetails'
    DefaultClientAccessOverview:
      allOf:
      - $ref: '#/components/schemas/LocalClientAccessOverview'
      - $ref: '#/components/schemas/VPNClientAccessOverview'
      - $ref: '#/components/schemas/TeleportClientAccessOverview'
    DerivedEntityMetadata:
      allOf:
      - $ref: '#/components/schemas/EntityMetadata'
    DeviceActionRequest:
      discriminator:
        mapping:
          RESTART: '#/components/schemas/DeviceRestartRequest'
        propertyName: action
      oneOf:
      - $ref: '#/components/schemas/DeviceRestartRequest'
    DeviceFeatures:
      properties:
        accessPoint:
          $ref: '#/components/schemas/AccessPointFeatureOverview'
          example: {}
        switching:
          $ref: '#/components/schemas/SwitchingFeatureOverview'
      type: object
    DevicePendingAdoption:
      properties:
        adoptionTargetSiteIds:
          items:
            format: uuid
            type: string
          type: array
          uniqueItems: true
        features:
          items:
            enum:
            - switching
            - accessPoint
            - gateway
            type: string
          type: array
          uniqueItems: true
        firmwareUpdatable:
          type: boolean
        firmwareVersion:
          example: 6.6.55
          type: string
        ipAddress:
          example: 192.168.1.55
          type: string
        macAddress:
          example: 94:2a:6f:26:c6:ca
          type: string
        model:
          example: UHDIW
          type: string
        state:
          enum:
          - ONLINE
          - OFFLINE
          - PENDING_ADOPTION
          - UPDATING
          - GETTING_READY
          - ADOPTING
          - DELETING
          - CONNECTION_INTERRUPTED
          - ISOLATED
          - U5G_INCORRECT_TOPOLOGY
          type: string
        supported:
          type: boolean
      required:
      - adoptionTargetSiteIds
      - features
      - firmwareUpdatable
      - ipAddress
      - macAddress
      - model
      - state
      - supported
      type: object
    DevicePendingAdoptionPage:
      properties:
        count:
          example: 10
          format: int32
          type: integer
        data:
          items:
            $ref: '#/components/schemas/DevicePendingAdoption'
          type: array
        limit:
          example: 25
          format: int32
          type: integer
        offset:
          example: 0
          format: int64
          type: integer
        totalCount:
          example: 1000
          format: int64
          type: integer
      required:
      - count
      - data
      - limit
      - offset
      - totalCount
      type: object
    DevicePhysicalInterfaces:
      properties:
        ports:
          items:
            $ref: '#/components/schemas/PortOverview'
          type: array
        radios:
          items:
            $ref: '#/components/schemas/WirelessRadioOverview'
          type: array
      type: object
    DeviceRestartRequest:
      allOf:
      - $ref: '#/components/schemas/DeviceActionRequest'
    DeviceTag:
      properties:
        deviceIds:
          items:
            format: uuid
            type: string
          minItems: 1
          type: array
        id:
          format: uuid
          type: string
        metadata:
          $ref: '#/components/schemas/UserOrOrchestratedEntityMetadata'
        name:
          minLength: 1
          type: string
      required:
      - deviceIds
      - id
      - metadata
      - name
      type: object
    DeviceUplinkInterfaceOverview:
      description: Uplink interface is device's connection to the parent device in
        the network topology
      properties:
        deviceId:
          format: uuid
          type: string
      required:
      - deviceId
      type: object
    EntityMetadata:
      discriminator:
        mapping:
          DERIVED: '#/components/schemas/DerivedEntityMetadata'
          ORCHESTRATED: '#/components/schemas/OrchestratedEntityMetadata'
