        \ status the client is using.\n\n- **Wired clients** may have direct access\
        \ without additional authorization.\n- **Wireless clients** can be connected\
        \ via a protected network or an open network\n  that may require additional\
        \ authorization (e.g., a guest portal).\n- **VPN clients** may have different\
        \ authorization mechanisms.\n\nCurrently, the only two supported access types\
        \ are `GUEST` (used for wired and wireless guest clients)\nand `DEFAULT` (a\
        \ placeholder, which might be refined in the future releases, used for all\
        \ other clients).\n\nFiltering is possible by `access.type`, for example `access.type.eq('GUEST')`\
        \ to list guest clients."
      discriminator:
        mapping:
          DEFAULT: '#/components/schemas/DefaultClientAccessDetails'
          GUEST: '#/components/schemas/GuestAccessDetails'
        propertyName: type
