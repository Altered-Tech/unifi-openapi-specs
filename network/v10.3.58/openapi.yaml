info:
  description: ''
  license: {}
  title: UniFi Network API
  version: 10.3.58
openapi: 3.1.0
paths:
  /v1/countries:
    get:
      description: 'Returns ISO-standard country codes and names,

        used for region-based configuration or regulatory compliance.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`code`|`STRING`|`eq` `ne` `in` `notIn`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

        </details>'
      operationId: getCountries
      parameters:
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
      - in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          maximum: 200
          minimum: 0
          type: integer
      - in: query
        name: filter
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryDefinitionPage'
          description: OK
      summary: List Countries
      tags:
      - Supporting Resources
  /v1/dpi/applications:
    get:
      description: 'Lists DPI-recognized applications grouped under categories. Useful
        for firewall or traffic analytics integration.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`INTEGER`|`eq` `ne` `in` `notIn`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

        </details>'
      operationId: getDpiApplications
      parameters:
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
      - in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          maximum: 200
          minimum: 0
          type: integer
      - in: query
        name: filter
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DPIApplicationPage'
          description: OK
      summary: List DPI Applications
      tags:
      - Supporting Resources
  /v1/dpi/categories:
    get:
      description: 'Returns predefined Deep Packet Inspection (DPI) application categories
        used for traffic identification and filtering.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`INTEGER`|`eq` `ne` `in` `notIn`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

        </details>'
      operationId: getDpiApplicationCategories
      parameters:
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
      - in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          maximum: 200
          minimum: 0
          type: integer
      - in: query
        name: filter
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DPICategoryPage'
          description: OK
      summary: List DPI Application Categories
      tags:
      - Supporting Resources
  /v1/info:
    get:
      description: Retrieve general information about the UniFi Network application.
      operationId: getInfo
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationInfo'
          description: OK
      summary: Get Application Info
      tags:
      - Application Info
  /v1/pending-devices:
    get:
      description: 'Retrieve a paginated list of devices pending adoption, including
        basic device information.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`macAddress`|`STRING`|`eq` `ne` `in` `notIn`|

        |`ipAddress`|`STRING`|`eq` `ne` `in` `notIn`|

        |`model`|`STRING`|`eq` `ne` `in` `notIn`|

        |`state`|`STRING`|`eq` `ne` `in` `notIn`|

        |`supported`|`BOOLEAN`|`eq` `ne`|

        |`firmwareVersion`|`STRING`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
        `le` `like` `in` `notIn`|

        |`firmwareUpdatable`|`BOOLEAN`|`eq` `ne`|

        |`features`|`SET(STRING)`|`isEmpty` `contains` `containsAny` `containsAll`
        `containsExactly`|

        </details>'
      operationId: getPendingDevicePage
      parameters:
      - in: query
        name: offset
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
      - in: query
        name: limit
        required: false
        schema:
          default: 25
          format: int32
          maximum: 200
          minimum: 0
          type: integer
      - in: query
        name: filter
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePendingAdoptionPage'
          description: OK
      summary: List Devices Pending Adoption
      tags:
      - UniFi Devices
  /v1/sites:
    get:
      description: 'Retrieve a paginated list of local sites managed by this Network
        application.

        Site ID is required for other UniFi Network API calls.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`UUID`|`eq` `ne` `in` `notIn`|

        |`internalReference`|`STRING`|`eq` `ne` `in` `notIn`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn`|

        </details>'
      operationId: getSiteOverviewPage
      parameters:
      - in: query
        name: offset
        required: false
        schema:
          default: 0
