        path:
        - v1
        - pending-devices
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - description: ID of the console to proxy requests to
