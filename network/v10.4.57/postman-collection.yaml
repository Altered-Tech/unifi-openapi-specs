- id: 58bcddcf-b3b6-4bbb-b487-fc2c9fa5ceb3
  name: Sites
  description:
    content: 'Endpoints for listing and managing UniFi sites within a local Network
      application.

      Site ID is required for most other API requests.'
    type: text/plain
  item:
  - id: 83d4fbe5-ed84-4812-be6c-f2c398411009
    name: List Local Sites
    request:
      name: List Local Sites
      description:
        content: 'Retrieve a paginated list of local sites managed by this Network
          application.

          Site ID is required for other UniFi Network API calls.


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`id`|`UUID`|`eq` `ne` `in` `notIn`|

          |`internalReference`|`STRING`|`eq` `ne` `in` `notIn`|

          |`name`|`STRING`|`eq` `ne` `in` `notIn`|

          </details>'
        type: text/plain
      url:
        path:
        - v1
        - sites
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
          key: consoleId
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
    - id: 5655a426-51ab-421b-a9aa-467b7250411d
      name: OK
      originalRequest:
        url:
          path:
          - v1
          - sites
          host:
          - '{{baseUrl}}'
          query:
          - key: offset
            value: '0'
          - key: limit
            value: '25'
          - key: filter
            value: <string>
          variable:
          - description: ID of the console to proxy requests to
            type: any
            value: '{{consoleId}}'
            key: consoleId
        header:
        - key: Accept
          value: application/json
        method: GET
        body: {}
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: "{\n  \"count\": 10,\n  \"data\": [\n    {\n      \"id\": \"478799d3-45ab-f9ba-df04-17bf28578190\"\
        ,\n      \"internalReference\": \"string\",\n      \"name\": \"string\"\n\
        \    },\n    {\n      \"id\": \"58c57243-81d5-ef53-1561-dc5858d880ae\",\n\
