    name: List Vouchers
    request:
      name: List Vouchers
      description:
        content: 'List Hotspot vouchers (paginated)


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`id`|`UUID`|`eq` `ne` `in` `notIn`|

          |`createdAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

          |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

          |`code`|`STRING`|`eq` `ne` `in` `notIn`|

          |`authorizedGuestLimit`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge`
          `lt` `le`|

          |`authorizedGuestCount`|`NUMBER`|`eq` `ne` `gt` `ge` `lt` `le`|

          |`activatedAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

          |`expiresAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

          |`expired`|`BOOLEAN`|`eq` `ne`|

          |`timeLimitMinutes`|`NUMBER`|`eq` `ne` `gt` `ge` `lt` `le`|

          |`dataUsageLimitMBytes`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge`
          `lt` `le`|

          |`rxRateLimitKbps`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
          `le`|

          |`txRateLimitKbps`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
          `le`|

          </details>'
        type: text/plain
