        path:
        - v1
        - sites
        - :siteId
        - hotspot
        - vouchers
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '100'
        - disabled: false
