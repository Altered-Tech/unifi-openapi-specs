components:
  schemas:
    ErrorMessage:
      properties:
        statusCode:
          type: integer
          format: int32
          example: 400
        statusName:
          type: string
          example: UNAUTHORIZED
        code:
          type: string
          example: api.authentication.missing-credentials
        message:
          type: string
          example: Missing credentials
        timestamp:
          type: string
          format: date-time
          example: '2024-11-27T08:13:46.966Z'
        requestPath:
          type: string
          example: /integration/v1/sites/123
        requestId:
          type: string
          format: uuid
          description: In case of Internal Server Error (core = 500), request ID can
            be used to track down the error in the server log
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      x-tags: Error Handling
    BlackoutScheduleConfigurationPerDay:
      discriminator:
        propertyName: type
        mapping:
          ALL_DAY: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerAllDayDto'
          TIME_RANGE: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerDayWithTimeRangeDto'
      properties:
        type:
          type: string
        day:
          type: string
          enum:
          - SUN
          - MON
          - TUE
          - WED
          - THU
          - FRI
          - SAT
      required:
      - day
      - type
    BroadcastingDeviceFilter:
      discriminator:
        propertyName: type
        mapping:
          DEVICES: '#/components/schemas/IntegrationWifiDevicesFilterDto'
          DEVICE_TAGS: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
      oneOf:
      - $ref: '#/components/schemas/IntegrationWifiDevicesFilterDto'
      - $ref: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
    IntegrationBlackoutScheduleConfiguration:
      properties:
        days:
          type: array
          items:
            $ref: '#/components/schemas/BlackoutScheduleConfigurationPerDay'
          minItems: 1
      required:
      - days
    IntegrationIotOptimizedWifiBroadcastCreateUpdateDto:
      allOf:
      - $ref: '#/components/schemas/WifiBroadcastCreateOrUpdate'
      required:
      - clientIsolationEnabled
      - enabled
      - hideName
      - multicastToUnicastConversionEnabled
      - name
      - securityConfiguration
      - uapsdEnabled
    IntegrationStandardWifiBroadcastCreateUpdateDto:
      allOf:
      - $ref: '#/components/schemas/WifiBroadcastCreateOrUpdate'
      - type: object
        properties:
          broadcastingFrequenciesGHz:
            type: array
            example:
            - 2.4
            - 5
            items:
              type: string
              enum:
              - '2.4'
              - '5'
              - '6'
            minItems: 1
            uniqueItems: true
          hotspotConfiguration:
            $ref: '#/components/schemas/WifiHotspotConfiguration'
          mloEnabled:
            type: boolean
          bandSteeringEnabled:
            type: boolean
          arpProxyEnabled:
            type: boolean
          bssTransitionEnabled:
            type: boolean
          dtimPeriodByFrequencyGHzOverride:
            $ref: '#/components/schemas/IntegrationWifiDtimPeriodConfigurationDto'
      required:
      - arpProxyEnabled
      - broadcastingFrequenciesGHz
      - bssTransitionEnabled
      - clientIsolationEnabled
      - enabled
      - hideName
      - multicastToUnicastConversionEnabled
      - name
      - securityConfiguration
      - uapsdEnabled
    IntegrationWifiBasicDataRateConfigurationDto:
      properties:
        '5':
          type: integer
          format: int32
          enum:
          - '6000'
          - '9000'
          - '12000'
          - '24000'
          example: 6000
        '2.4':
          type: integer
          format: int32
          enum:
          - '1000'
          - '2000'
          - '5500'
          - '6000'
          - '9000'
          - '11000'
          - '12000'
          - '24000'
          example: 2000
      required:
      - '2.4'
      - '5'
    IntegrationWifiBlackoutScheduleConfigurationPerAllDayDto:
      allOf:
      - $ref: '#/components/schemas/BlackoutScheduleConfigurationPerDay'
      required:
      - day
    IntegrationWifiBlackoutScheduleConfigurationPerDayWithTimeRangeDto:
      allOf:
      - $ref: '#/components/schemas/BlackoutScheduleConfigurationPerDay'
      - type: object
        properties:
