          format: int32
          default: 0
          minimum: 0
      - name: limit
        in: query
        required: false
        schema:
          format: int32
          default: 25
          maximum: 200
          minimum: 0
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: siteId
        in: path
        required: true
