      - WiFi Broadcasts
      summary: Delete Wifi Broadcast
      description: Delete an existing Wifi Broadcast from the specified site.
      operationId: deleteWifiBroadcast
      parameters:
      - name: wifiBroadcastId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: force
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
