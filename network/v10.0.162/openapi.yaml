  /v1/sites/{siteId}/wifi/broadcasts:
    get:
      tags:
      - WiFi Broadcasts
      summary: List Wifi Broadcasts
      description: 'Retrieve a paginated list of all Wifi Broadcasts on a site.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`type`|`STRING`|`eq` `ne` `in` `notIn`|

        |`id`|`UUID`|`eq` `ne` `in` `notIn`|

        |`enabled`|`BOOLEAN`|`eq` `ne`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

        |`broadcastingFrequenciesGHz`|`SET(DECIMAL)`|`contains` `containsAny` `containsAll`
        `containsExactly`|

        |`metadata.origin`|`STRING`|`eq` `ne` `in` `notIn`|

        |`network.type`|`STRING`|`eq` `ne` `in` `notIn` `isNull` `isNotNull`|

        |`network.networkId`|`UUID`|`eq` `ne` `in` `notIn`|

        |`securityConfiguration.type`|`STRING`|`eq` `ne` `in` `notIn`|

        |`broadcastingDeviceFilter.type`|`STRING`|`eq` `ne` `in` `notIn` `isNull`
        `isNotNull`|

        |`broadcastingDeviceFilter.deviceIds`|`SET(UUID)`|`contains` `containsAny`
        `containsAll` `containsExactly`|

        |`broadcastingDeviceFilter.deviceTagIds`|`SET(UUID)`|`contains` `containsAny`
        `containsAll` `containsExactly`|

        |`hotspotConfiguration.type`|`STRING`|`eq` `ne` `in` `notIn`|

        </details>'
      operationId: getWifiBroadcastPage
      parameters:
      - name: offset
        in: query
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
      - name: limit
        in: query
        required: false
        schema:
          format: int32
          default: 25
          maximum: 200
          minimum: 0
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationWifiBroadcastPageDto'
    post:
      tags:
      - WiFi Broadcasts
      summary: Create Wifi Broadcast
      description: Create a new Wifi Broadcast on the specified site.
      operationId: createWifiBroadcast
      parameters:
