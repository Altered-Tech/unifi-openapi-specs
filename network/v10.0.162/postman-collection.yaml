        - v1
        - sites
        - :siteId
        - devices
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - disabled: false
          type: any
          value: <uuid>
          key: siteId
