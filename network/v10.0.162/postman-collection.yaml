- id: f69681d9-6edb-4633-8bcd-918d1139f01a
  name: Application Info
  description:
    content: 'Returns general details about the UniFi Network application,

      including version and runtime metadata. Useful for integration validation.'
    type: text/plain
  item:
  - id: a6aff50e-7571-416f-b54e-603265eb60ae
    name: Get Application Info
    request:
      name: Get Application Info
      description:
        content: Retrieve general information about the UniFi Network application.
        type: text/plain
      url:
        path:
        - v1
        - info
        host:
        - '{{baseUrl}}'
        query: []
        variable:
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
          key: consoleId
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
    - id: c05f4276-237b-47f1-9e32-ece031f70d0c
      name: OK
      originalRequest:
        url:
          path:
          - v1
          - info
          host:
          - '{{baseUrl}}'
          query: []
          variable:
          - description: ID of the console to proxy requests to
            type: any
            value: '{{consoleId}}'
            key: consoleId
        header:
        - key: Accept
          value: application/json
        method: GET
        body: {}
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: "{\n  \"applicationVersion\": \"9.1.0\"\n}"
      cookie: []
