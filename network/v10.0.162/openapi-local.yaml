openapi: 3.1.0
info:
  title: UniFi Network API
  description: ''
  license: {}
  version: 10.0.162
servers:
- url: https://{host}/proxy/network/integration
  description: Local (direct access)
  variables:
    host:
      default: 192.168.1.1
      description: IP address or hostname of the UniFi console
tags:
- name: Getting Started
  description: "Provides an overview of the UniFi Network API, including authentication\
    \ using API keys and request format. \nStart here to understand how to connect\
    \ and make your first request.\n\n### Introduction\n\nEach UniFi Application has\
    \ its own API endpoints running locally on each site,\noffering detailed analytics\
    \ and control related to that specific application.\nFor a single endpoint with\
    \ high-level insights across all your UniFi sites,\nrefer to the [UniFi Site Manager\
    \ API](https://developer.ui.com).\n\n### Authentication and Request Format\n\n\
    An API Key is a unique identifier used to authenticate API requests.\nTo generate\
    \ API Keys and view an example of the API Request Format,\nvisit the Integrations\
    \ section of your UniFi application."
- name: Filtering
  description: $1c
- name: Error Handling
  description: 'Describes the standard API error response structure, including error
    codes,

    status names, and troubleshooting guidance.'
- name: Application Info
  description: 'Returns general details about the UniFi Network application,

    including version and runtime metadata. Useful for integration validation.'
- name: Sites
  description: 'Endpoints for listing and managing UniFi sites within a local Network
    application.

    Site ID is required for most other API requests.'
- name: UniFi Devices
  description: 'Endpoints to list, inspect, and interact with UniFi devices, including
    adopted and pending devices.

    Provides device stats, port control, and actions.'
- name: Clients
  description: 'Endpoints for viewing and managing connected clients (wired, wireless,
    VPN, and guest).

    Supports actions such as authorizing or unauthorizing guest access.'
- name: Networks
  description: 'Endpoints for creating, updating, deleting, and inspecting network
    configurations

    including VLANs, DHCP, NAT, and IPv4/IPv6 settings.'
- name: WiFi Broadcasts
  description: 'Endpoints to create, update, or remove WiFi networks (SSIDs).

    Supports configuration of security, band steering, multicast filtering, and captive
    portals.'
- name: Hotspot
  description: "Endpoints for managing guest access via Hotspot vouchers â\x80\x94\
    \ create, list, or revoke vouchers\nand track their usage and expiration."
- name: Firewall
  description: 'Endpoints for managing custom firewall zones and policies within a
    site.

    Define or update network segmentation and security boundaries.'
- name: Access Control (ACL Rules)
  description: 'Endpoints for creating, listing, and managing ACL (Access Control
    List) rule

    that enforce traffic filtering across devices and networks.'
- name: Traffic Matching Lists
  description: Endpoints for managing port and IP address lists used across firewall
    policy configurations.
- name: Supporting Resources
  description: 'Contains read-only reference endpoints used to retrieve supporting
    data

    such as WAN interfaces, DPI categories, country codes, RADIUS profiles, and device
    tags.'
paths:
  /v1/sites/{siteId}/wifi/broadcasts/{wifiBroadcastId}:
    get:
      tags:
      - WiFi Broadcasts
      summary: Get Wifi Broadcast Details
      description: Retrieve detailed information about a specific Wifi.
      operationId: getWifiBroadcastDetails
      parameters:
      - name: wifiBroadcastId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: type
                  mapping:
                    STANDARD: '#/components/schemas/IntegrationStandardWifiBroadcastDetailDto'
                    IOT_OPTIMIZED: '#/components/schemas/IntegrationIotOptimizedWifiBroadcastDetailDto'
                properties:
                  type:
                    type: string
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  metadata:
                    discriminator:
                      propertyName: origin
                      mapping:
                        USER_DEFINED: '#/components/schemas/UserDefinedEntityMetadata'
                        DERIVED: '#/components/schemas/DerivedEntityMetadata'
                        ORCHESTRATED: '#/components/schemas/OrchestratedEntityMetadata'
                    properties:
                      origin:
                        type: string
                    required:
                    - origin
                    title: User or derived or orchestrated entity metadata
                  enabled:
                    type: boolean
                  network:
                    discriminator:
                      propertyName: type
                      mapping:
                        NATIVE: '#/components/schemas/IntegrationWifiNativeNetworkDto'
                        SPECIFIC: '#/components/schemas/IntegrationWifiSpecificNetworkDto'
                    properties:
                      type:
                        type: string
                    required:
                    - type
                    title: Wifi network reference
                  securityConfiguration:
                    discriminator:
                      propertyName: type
                      mapping:
                        OPEN: '#/components/schemas/IntegrationWifiOpenSecurityConfigurationDetailDto'
                        WPA2_PERSONAL: '#/components/schemas/IntegrationWifiWpa2PersonalSecurityConfigurationDetailDto'
                        WPA3_PERSONAL: '#/components/schemas/IntegrationWifiWpa3PersonalSecurityConfigurationDetailDto'
                        WPA2_WPA3_PERSONAL: '#/components/schemas/IntegrationWifiWpa2Wpa3PersonalSecurityConfigurationDetailDto'
                        WPA2_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa2EnterpriseSecurityConfigurationDetailDto'
                        WPA3_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa3EnterpriseSecurityConfigurationDetailDto'
                        WPA2_WPA3_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa2Wpa3EnterpriseSecurityConfigurationDetailDto'
                    properties:
                      type:
                        type: string
                      radiusConfiguration: {}
                    required:
                    - type
                    title: Wifi security configuration detailObject
                  broadcastingDeviceFilter:
                    description: Defines the custom scope of devices that will broadcast
                      this WiFi network. If null, the WiFi network will be broadcast
                      by all Access Point capable devices.
                    discriminator:
                      propertyName: type
                      mapping:
                        DEVICES: '#/components/schemas/IntegrationWifiDevicesFilterDto'
                        DEVICE_TAGS: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
                    properties:
                      type:
                        type: string
                    required:
                    - type
                    title: Broadcasting device filter
                  mdnsProxyConfiguration:
                    discriminator:
                      propertyName: mode
                      mapping:
                        AUTO: '#/components/schemas/IntegrationWifiMdnsProxyAutoConfigurationDto'
                        CUSTOM: '#/components/schemas/IntegrationWifiMdnsProxyCustomConfigurationDto'
                    properties:
                      mode:
                        type: string
                    required:
                    - mode
                    title: mDNS filtering configuration
                  multicastFilteringPolicy:
                    discriminator:
                      propertyName: action
                      mapping:
                        ALLOW: '#/components/schemas/IntegrationWifiMulticastFilteringAllowPolicyDto'
                        BLOCK: '#/components/schemas/IntegrationWifiMulticastFilteringBlockPolicyDto'
                    properties:
                      action:
                        type: string
                    required:
                    - action
                    title: Multicast filtering policy
                  multicastToUnicastConversionEnabled:
                    type: boolean
                  clientIsolationEnabled:
                    type: boolean
                  hideName:
                    type: boolean
                  uapsdEnabled:
                    type: boolean
                    description: Indicates whether Unscheduled Automatic Power Save
                      Delivery (U-APSD) is enabled
                  basicDataRateKbpsByFrequencyGHz:
                    properties:
                      '5':
                        type: integer
                        format: int32
                        enum:
                        - '6000'
                        - '9000'
                        - '12000'
                        - '24000'
                        example: 6000
                      '2.4':
                        type: integer
                        format: int32
                        enum:
                        - '1000'
                        - '2000'
                        - '5500'
                        - '6000'
                        - '9000'
                        - '11000'
                        - '12000'
                        - '24000'
                        example: 2000
                    required:
                    - '2.4'
                    - '5'
                    title: IntegrationWifiBasicDataRateConfigurationDto
                  clientFilteringPolicy:
                    description: Client connection filtering policy. Allow/restrict
                      access to the WiFi network based on client device MAC addresses.
                    properties:
                      action:
                        type: string
                        enum:
                        - ALLOW
                        - BLOCK
                      macAddressFilter:
                        type: array
                        items:
                          type: string
                        maxItems: 512
                        minItems: 1
                        uniqueItems: true
                    required:
                    - action
                    - macAddressFilter
                    title: IntegrationWifiClientFilteringPolicyDto
                  blackoutScheduleConfiguration:
                    properties:
                      days:
                        type: array
                        items:
                          discriminator:
                            propertyName: type
                            mapping:
                              ALL_DAY: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerAllDayDto'
                              TIME_RANGE: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerDayWithTimeRangeDto'
                          properties:
                            type:
                              type: string
                            day:
                              type: string
                              enum:
                              - SUN
                              - MON
                              - TUE
                              - WED
                              - THU
                              - FRI
                              - SAT
                          required:
                          - day
                          - type
                          title: Blackout schedule configuration per day
                        minItems: 1
                    required:
                    - days
                    title: Integration blackout schedule configuration
                required:
                - clientIsolationEnabled
                - enabled
                - hideName
                - id
                - metadata
                - multicastToUnicastConversionEnabled
                - name
                - securityConfiguration
                - type
                - uapsdEnabled
                title: Wifi broadcast details
    put:
      tags:
      - WiFi Broadcasts
      summary: Update Wifi Broadcast
      description: Update an existing Wifi Broadcast on the specified site.
      operationId: updateWifiBroadcast
      parameters:
      - name: wifiBroadcastId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              discriminator:
                propertyName: type
                mapping:
                  STANDARD: '#/components/schemas/IntegrationStandardWifiBroadcastCreateUpdateDto'
                  IOT_OPTIMIZED: '#/components/schemas/IntegrationIotOptimizedWifiBroadcastCreateUpdateDto'
              properties:
                type:
                  type: string
                name:
                  type: string
                network:
                  discriminator:
                    propertyName: type
                    mapping:
                      NATIVE: '#/components/schemas/IntegrationWifiNativeNetworkDto'
                      SPECIFIC: '#/components/schemas/IntegrationWifiSpecificNetworkDto'
                  properties:
                    type:
                      type: string
                  required:
                  - type
                  title: Wifi network reference
                enabled:
                  type: boolean
                securityConfiguration:
                  discriminator:
                    propertyName: type
                    mapping:
                      OPEN: '#/components/schemas/IntegrationWifiOpenSecurityConfigurationDetailDto'
                      WPA2_PERSONAL: '#/components/schemas/IntegrationWifiWpa2PersonalSecurityConfigurationDetailDto'
                      WPA3_PERSONAL: '#/components/schemas/IntegrationWifiWpa3PersonalSecurityConfigurationDetailDto'
                      WPA2_WPA3_PERSONAL: '#/components/schemas/IntegrationWifiWpa2Wpa3PersonalSecurityConfigurationDetailDto'
                      WPA2_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa2EnterpriseSecurityConfigurationDetailDto'
                      WPA3_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa3EnterpriseSecurityConfigurationDetailDto'
                      WPA2_WPA3_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa2Wpa3EnterpriseSecurityConfigurationDetailDto'
                  properties:
                    type:
                      type: string
                    radiusConfiguration: {}
                  required:
                  - type
                  title: Wifi security configuration detailObject
                broadcastingDeviceFilter:
                  description: Defines the custom scope of devices that will broadcast
                    this WiFi network. If null, the WiFi network will be broadcast
                    by all Access Point capable devices.
                  discriminator:
                    propertyName: type
                    mapping:
                      DEVICES: '#/components/schemas/IntegrationWifiDevicesFilterDto'
                      DEVICE_TAGS: '#/components/schemas/IntegrationWifiDeviceTagsFilterDto'
                  properties:
                    type:
                      type: string
                  required:
                  - type
                  title: Broadcasting device filter
                mdnsProxyConfiguration:
                  discriminator:
                    propertyName: mode
                    mapping:
                      AUTO: '#/components/schemas/IntegrationWifiMdnsProxyAutoConfigurationDto'
                      CUSTOM: '#/components/schemas/IntegrationWifiMdnsProxyCustomConfigurationDto'
                  properties:
                    mode:
                      type: string
                  required:
                  - mode
                  title: mDNS filtering configuration
                multicastFilteringPolicy:
                  discriminator:
                    propertyName: action
                    mapping:
                      ALLOW: '#/components/schemas/IntegrationWifiMulticastFilteringAllowPolicyDto'
                      BLOCK: '#/components/schemas/IntegrationWifiMulticastFilteringBlockPolicyDto'
                  properties:
                    action:
                      type: string
                  required:
                  - action
                  title: Multicast filtering policy
                multicastToUnicastConversionEnabled:
                  type: boolean
                clientIsolationEnabled:
                  type: boolean
                hideName:
                  type: boolean
                uapsdEnabled:
                  type: boolean
                  description: Indicates whether Unscheduled Automatic Power Save
                    Delivery (U-APSD) is enabled
                basicDataRateKbpsByFrequencyGHz:
                  properties:
                    '5':
                      type: integer
                      format: int32
                      enum:
                      - '6000'
                      - '9000'
                      - '12000'
                      - '24000'
                      example: 6000
                    '2.4':
                      type: integer
                      format: int32
                      enum:
                      - '1000'
                      - '2000'
                      - '5500'
                      - '6000'
                      - '9000'
                      - '11000'
                      - '12000'
                      - '24000'
                      example: 2000
                  required:
                  - '2.4'
                  - '5'
                  title: IntegrationWifiBasicDataRateConfigurationDto
                clientFilteringPolicy:
                  description: Client connection filtering policy. Allow/restrict
                    access to the WiFi network based on client device MAC addresses.
                  properties:
                    action:
                      type: string
                      enum:
                      - ALLOW
                      - BLOCK
                    macAddressFilter:
                      type: array
                      items:
                        type: string
                      maxItems: 512
                      minItems: 1
                      uniqueItems: true
                  required:
                  - action
                  - macAddressFilter
                  title: IntegrationWifiClientFilteringPolicyDto
                blackoutScheduleConfiguration:
                  properties:
                    days:
                      type: array
                      items:
                        discriminator:
                          propertyName: type
                          mapping:
                            ALL_DAY: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerAllDayDto'
                            TIME_RANGE: '#/components/schemas/IntegrationWifiBlackoutScheduleConfigurationPerDayWithTimeRangeDto'
                        properties:
                          type:
                            type: string
                          day:
                            type: string
                            enum:
                            - SUN
                            - MON
                            - TUE
                            - WED
                            - THU
                            - FRI
                            - SAT
                        required:
                        - day
                        - type
                        title: Blackout schedule configuration per day
                      minItems: 1
                  required:
                  - days
                  title: Integration blackout schedule configuration
              required:
              - clientIsolationEnabled
              - enabled
              - hideName
              - multicastToUnicastConversionEnabled
              - name
              - securityConfiguration
              - type
              - uapsdEnabled
              title: Wifi broadcast create or update
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: type
                  mapping:
                    STANDARD: '#/components/schemas/IntegrationStandardWifiBroadcastDetailDto'
                    IOT_OPTIMIZED: '#/components/schemas/IntegrationIotOptimizedWifiBroadcastDetailDto'
                properties:
                  type:
                    type: string
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  metadata:
                    discriminator:
                      propertyName: origin
                      mapping:
                        USER_DEFINED: '#/components/schemas/UserDefinedEntityMetadata'
                        DERIVED: '#/components/schemas/DerivedEntityMetadata'
                        ORCHESTRATED: '#/components/schemas/OrchestratedEntityMetadata'
                    properties:
                      origin:
                        type: string
                    required:
                    - origin
                    title: User or derived or orchestrated entity metadata
                  enabled:
                    type: boolean
                  network:
                    discriminator:
                      propertyName: type
                      mapping:
                        NATIVE: '#/components/schemas/IntegrationWifiNativeNetworkDto'
                        SPECIFIC: '#/components/schemas/IntegrationWifiSpecificNetworkDto'
                    properties:
                      type:
                        type: string
                    required:
                    - type
                    title: Wifi network reference
                  securityConfiguration:
                    discriminator:
                      propertyName: type
                      mapping:
                        OPEN: '#/components/schemas/IntegrationWifiOpenSecurityConfigurationDetailDto'
                        WPA2_PERSONAL: '#/components/schemas/IntegrationWifiWpa2PersonalSecurityConfigurationDetailDto'
                        WPA3_PERSONAL: '#/components/schemas/IntegrationWifiWpa3PersonalSecurityConfigurationDetailDto'
                        WPA2_WPA3_PERSONAL: '#/components/schemas/IntegrationWifiWpa2Wpa3PersonalSecurityConfigurationDetailDto'
                        WPA2_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa2EnterpriseSecurityConfigurationDetailDto'
                        WPA3_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa3EnterpriseSecurityConfigurationDetailDto'
                        WPA2_WPA3_ENTERPRISE: '#/components/schemas/IntegrationWifiWpa2Wpa3EnterpriseSecurityConfigurationDetailDto'
                    properties:
                      type:
