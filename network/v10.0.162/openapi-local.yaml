                  dataUsageLimitMBytes:
                    type: integer
                    format: int64
                    description: (Optional) data usage limit in megabytes
                    example: 1024
                  rxRateLimitKbps:
                    type: integer
                    format: int64
                    description: (Optional) download rate limit in kilobits per second
                    example: 1000
                  txRateLimitKbps:
                    type: integer
                    format: int64
                    description: (Optional) upload rate limit in kilobits per second
                    example: 1000
                required:
                - authorizedGuestCount
                - code
                - createdAt
                - expired
                - id
                - name
                - timeLimitMinutes
                title: Hotspot voucher details
