    delete:
      tags:
      - WiFi Broadcasts
      summary: Delete Wifi Broadcast
      description: Delete an existing Wifi Broadcast from the specified site.
      operationId: deleteWifiBroadcast
      parameters:
      - name: wifiBroadcastId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: force
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
  /v1/sites/{siteId}/traffic-matching-lists/{trafficMatchingListId}:
    get:
      tags:
      - Traffic Matching Lists
      summary: Get Traffic Matching List
      description: Get an exist traffic matching list on a site.
      operationId: getTrafficMatchingList
      parameters:
      - name: trafficMatchingListId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: type
                  mapping:
                    PORTS: '#/components/schemas/IntegrationPortTrafficMatchingListDto'
                    IPV4_ADDRESSES: '#/components/schemas/IntegrationIpV4TrafficMatchingListDto'
                    IPV6_ADDRESSES: '#/components/schemas/IntegrationIpV6TrafficMatchingListDto'
                properties:
                  type:
                    type: string
                  id:
                    type: string
                    format: uuid
                    example: ffcdb32c-6278-4364-8947-df4f77118df8
                  name:
                    type: string
                    example: Allowed port list|Protected IP list
                required:
                - id
                - name
                - type
                title: Traffic matching list
    put:
      tags:
      - Traffic Matching Lists
      summary: Update Traffic Matching List
      description: Update an exist traffic matching list on a site.
      operationId: updateTrafficMatchingList
      parameters:
      - name: trafficMatchingListId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              discriminator:
                propertyName: type
                mapping:
                  PORTS: '#/components/schemas/IntegrationPortTrafficMatchingListCreateUpdateDto'
                  IPV4_ADDRESSES: '#/components/schemas/IntegrationIpV4TrafficMatchingListCreateUpdateDto'
                  IPV6_ADDRESSES: '#/components/schemas/IntegrationIpV6TrafficMatchingListCreateUpdateDto'
              properties:
                type:
                  type: string
                name:
                  type: string
                  example: Allowed port list|Protected IP list
              required:
              - name
              - type
              title: Create or update traffic matching list
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: type
                  mapping:
                    PORTS: '#/components/schemas/IntegrationPortTrafficMatchingListDto'
                    IPV4_ADDRESSES: '#/components/schemas/IntegrationIpV4TrafficMatchingListDto'
                    IPV6_ADDRESSES: '#/components/schemas/IntegrationIpV6TrafficMatchingListDto'
                properties:
                  type:
                    type: string
                  id:
                    type: string
                    format: uuid
                    example: ffcdb32c-6278-4364-8947-df4f77118df8
                  name:
                    type: string
                    example: Allowed port list|Protected IP list
                required:
                - id
                - name
                - type
                title: Traffic matching list
    delete:
      tags:
      - Traffic Matching Lists
      summary: Delete Traffic Matching List
      description: Delete an exist traffic matching list on a site.
      operationId: deleteTrafficMatchingList
      parameters:
      - name: trafficMatchingListId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
  /v1/sites/{siteId}/networks/{networkId}:
    get:
      tags:
      - Networks
      summary: Get Network Details
      description: Retrieve detailed information about a specific network.
      operationId: getNetworkDetails
      parameters:
      - name: networkId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: management
                  mapping:
                    UNMANAGED: '#/components/schemas/UnmanagedNetworkDetails'
                    GATEWAY: '#/components/schemas/GatewayManagedNetworkDetails'
                    SWITCH: '#/components/schemas/SwitchManagedNetworkDetails'
                properties:
                  management:
                    type: string
