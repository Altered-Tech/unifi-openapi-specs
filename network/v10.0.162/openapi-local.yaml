                    properties:
                      action:
                        type: string
                        enum:
                        - ALLOW
                        - BLOCK
                      macAddressFilter:
                        type: array
                        items:
                          type: string
                        maxItems: 512
                        minItems: 1
                        uniqueItems: true
                    required:
                    - action
                    - macAddressFilter
                    title: IntegrationWifiClientFilteringPolicyDto
                  blackoutScheduleConfiguration:
                    properties:
                      days:
                        type: array
