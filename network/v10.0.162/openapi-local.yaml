              authorizationMethod:
                type: string
                description: Guest authorization method (API, Voucher etc)
                enum:
                - VOUCHER
                - API
                - OTHER
              expiresAt:
                type: string
                format: date-time
                description: Timestamp when the guest will get automatically unauthorized
              dataUsageLimitMBytes:
                type: integer
                format: int64
                description: (Optional) data usage limit in megabytes
                example: 1024
              rxRateLimitKbps:
                type: integer
                format: int64
                description: (Optional) download rate limit in kilobits per second
                example: 1000
              txRateLimitKbps:
                type: integer
                format: int64
                description: (Optional) upload rate limit in kilobits per second
                example: 1000
              usage:
                properties:
                  durationSec:
                    type: integer
                    format: int64
                  rxBytes:
                    type: integer
                    format: int64
                  txBytes:
                    type: integer
                    format: int64
                  bytes:
                    type: integer
                    format: int64
                required:
