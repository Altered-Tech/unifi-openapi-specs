  /v1/sites/{siteId}/clients:
    get:
      tags:
      - Clients
      summary: List Connected Clients
      description: 'Retrieve a paginated list of all connected clients on a site,
        including physical devices (computers, smartphones) and active VPN connections.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`UUID`|`eq` `ne` `in` `notIn`|

        |`type`|`STRING`|`eq` `ne` `in` `notIn`|

        |`macAddress`|`STRING`|`isNull` `isNotNull` `eq` `ne` `in` `notIn`|

        |`ipAddress`|`STRING`|`isNull` `isNotNull` `eq` `ne` `in` `notIn`|

        |`connectedAt`|`TIMESTAMP`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt` `le`|

        |`access.type`|`STRING`|`eq` `ne` `in` `notIn`|

        |`access.authorized`|`BOOLEAN`|`isNull` `isNotNull` `eq` `ne`|

        </details>'
      operationId: getConnectedClientOverviewPage
      parameters:
      - name: offset
        in: query
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
      - name: limit
        in: query
        required: false
        schema:
          format: int32
          default: 25
          maximum: 200
          minimum: 0
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  offset:
                    type: integer
                    format: int64
                    example: 0
                  limit:
                    type: integer
                    format: int32
                    example: 25
                  count:
                    type: integer
                    format: int32
                    example: 10
                  totalCount:
                    type: integer
                    format: int64
                    example: 1000
                  data:
                    type: array
                    items:
                      discriminator:
                        propertyName: type
                        mapping:
                          WIRED: '#/components/schemas/WiredClientOverview'
                          WIRELESS: '#/components/schemas/WirelessClientOverview'
                          VPN: '#/components/schemas/VPNClientConnectionOverview'
                          TELEPORT: '#/components/schemas/TeleportClientConnectionOverview'
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        connectedAt:
                          type: string
                          format: date-time
                        ipAddress:
                          type: string
                        access:
                          example:
                            type: DEFAULT
                          title: Client access overview
                        type:
                          type: string
                      required:
                      - access
                      - id
                      - name
                      - type
                      title: Client overview
                required:
                - count
                - data
                - limit
                - offset
                - totalCount
                title: Client overview page
