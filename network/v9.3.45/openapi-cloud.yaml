        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  uptimeSec:
                    type: integer
                    format: int64
                  lastHeartbeatAt:
                    type: string
                    format: date-time
                  nextHeartbeatAt:
                    type: string
                    format: date-time
                  loadAverage1Min:
                    type: number
                    format: double
                  loadAverage5Min:
                    type: number
                    format: double
                  loadAverage15Min:
                    type: number
                    format: double
                  cpuUtilizationPct:
                    type: number
                    format: double
                  memoryUtilizationPct:
                    type: number
                    format: double
                  uplink:
                    properties:
                      txRateBps:
                        type: integer
                        format: int64
                      rxRateBps:
                        type: integer
                        format: int64
