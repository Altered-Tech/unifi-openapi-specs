openapi: 3.1.0
info:
  title: UniFi Network API
  description: ''
  license: {}
  version: 9.3.45
servers:
- url: https://api.ui.com/v1/connector/consoles/{consoleId}/proxy/network/integration
  description: Cloud connector
  variables:
    consoleId:
      default: ''
      description: Console Host ID
tags:
- name: Getting Started
  description: '### Introduction


    Each UniFi Application has its own API endpoints running locally on each site,

    offering detailed analytics and control related to that specific application.

    For a single endpoint with high-level insights across all your UniFi sites,

    refer to the [UniFi Site Manager API](https://developer.ui.com).


    ### Authentication and Request Format


    An API Key is a unique identifier used to authenticate API requests.

    To generate API Keys and view an example of the API Request Format,

    visit the Integrations section of your UniFi application.'
- name: Filtering
  description: $1b
- name: Errors
  description: 'All endpoints use the same generic error message format:'
- name: About Application
- name: Sites
- name: UniFi Devices
- name: Clients
- name: Hotspot Vouchers
paths:
  /v1/sites/{siteId}/hotspot/vouchers:
    get:
      tags:
      - Hotspot Vouchers
      summary: List Vouchers
      description: 'Retrieve a paginated list of Hotspot vouchers.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`UUID`|`eq` `ne` `in` `notIn`|

        |`createdAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

        |`code`|`STRING`|`eq` `ne` `in` `notIn`|

        |`authorizedGuestLimit`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge`
        `lt` `le`|

        |`authorizedGuestCount`|`NUMBER`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`activatedAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`expiresAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`expired`|`BOOLEAN`|`eq` `ne`|

        |`timeLimitMinutes`|`NUMBER`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`dataUsageLimitMBytes`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge`
        `lt` `le`|

        |`rxRateLimitKbps`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
        `le`|

        |`txRateLimitKbps`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
        `le`|

        </details>'
      operationId: getVouchers
      parameters:
      - name: offset
        in: query
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
      - name: limit
        in: query
        required: false
        schema:
          format: int32
          default: 100
          maximum: 1000
          minimum: 0
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  offset:
                    type: integer
                    format: int64
                    example: 0
                  limit:
                    type: integer
                    format: int32
                    example: 25
                  count:
                    type: integer
                    format: int32
                    example: 10
                  totalCount:
                    type: integer
                    format: int64
                    example: 1000
                  data:
                    type: array
                    items:
                      properties:
                        id:
                          type: string
                          format: uuid
                        createdAt:
                          type: string
                          format: date-time
                        name:
                          type: string
                          description: Voucher note, may contain duplicate values
                            across multiple vouchers
                          example: hotel-guest
                        code:
                          type: string
                          description: Secret code to active the voucher using the
                            Hotspot portal
                          example: 4861409510
                        authorizedGuestLimit:
                          type: integer
                          format: int64
                          description: (Optional) limit for how many different guests
                            can use the same voucher to authorize network access
                          example: 1
                        authorizedGuestCount:
                          type: integer
                          format: int64
                          description: For how many guests the voucher has been used
                            to authorize network access
                          example: 0
                        activatedAt:
                          type: string
                          format: date-time
                          description: (Optional) timestamp when the voucher has been
                            activated (authorization time of the first guest)
                        expiresAt:
                          type: string
                          format: date-time
                          description: (Optional) timestamp when the voucher will
                            become expired. All guests using the voucher will be unauthorized
                            from network access
                        expired:
                          type: boolean
                          description: Whether the voucher has been expired and can
                            no longer be used to authorize network access
                        timeLimitMinutes:
                          type: integer
                          format: int64
                          description: 'How long (in minutes) the voucher will provide
                            access to the network since authorization of the first
                            guest.

                            Subsequently connected guests, if allowed, will share
                            the same expiration time.'
                          example: 1440
                        dataUsageLimitMBytes:
                          type: integer
                          format: int64
                          description: (Optional) data usage limit in megabytes
                          example: 1024
                        rxRateLimitKbps:
                          type: integer
                          format: int64
                          description: (Optional) download rate limit in kilobits
                            per second
                          example: 1000
                        txRateLimitKbps:
                          type: integer
                          format: int64
                          description: (Optional) upload rate limit in kilobits per
                            second
                          example: 1000
                      required:
                      - authorizedGuestCount
                      - code
                      - createdAt
                      - expired
                      - id
                      - name
                      - timeLimitMinutes
                      title: Hotspot voucher details
                required:
                - count
                - data
                - limit
                - offset
                - totalCount
                title: Hotspot voucher detail page
    post:
      tags:
      - Hotspot Vouchers
      summary: Generate Vouchers
      description: Create one or more Hotspot vouchers.
      operationId: createVouchers
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              properties:
                count:
                  type: integer
                  format: int32
                  default: '1'
                  description: Number of vouchers to generate
                  maximum: 1000
                  minimum: 1
                name:
                  type: string
                  description: Voucher note, duplicated across all generated vouchers
                authorizedGuestLimit:
                  type: integer
                  format: int64
                  description: (Optional) limit for how many different guests can
                    use the same voucher to authorize network access
                  example: 1
                  minimum: 1
                timeLimitMinutes:
                  type: integer
                  format: int64
                  description: 'How long (in minutes) the voucher will provide access
                    to the network since authorization of the first guest.

                    Subsequently connected guests, if allowed, will share the same
                    expiration time.'
                  maximum: 1000000
                  minimum: 1
                dataUsageLimitMBytes:
                  type: integer
                  format: int64
                  description: (Optional) data usage limit in megabytes
                  maximum: 1048576
                  minimum: 1
                rxRateLimitKbps:
                  type: integer
                  format: int64
                  description: (Optional) download rate limit in kilobits per second
                  maximum: 100000
                  minimum: 2
                txRateLimitKbps:
                  type: integer
                  format: int64
                  description: (Optional) upload rate limit in kilobits per second
                  maximum: 100000
                  minimum: 2
              required:
              - name
              - timeLimitMinutes
              title: Hotspot voucher creation request
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                properties:
                  vouchers:
                    type: array
                    items:
                      properties:
                        id:
                          type: string
                          format: uuid
                        createdAt:
                          type: string
                          format: date-time
                        name:
                          type: string
                          description: Voucher note, may contain duplicate values
                            across multiple vouchers
                          example: hotel-guest
                        code:
                          type: string
                          description: Secret code to active the voucher using the
                            Hotspot portal
                          example: 4861409510
                        authorizedGuestLimit:
                          type: integer
                          format: int64
                          description: (Optional) limit for how many different guests
                            can use the same voucher to authorize network access
                          example: 1
                        authorizedGuestCount:
                          type: integer
                          format: int64
                          description: For how many guests the voucher has been used
                            to authorize network access
                          example: 0
                        activatedAt:
                          type: string
                          format: date-time
                          description: (Optional) timestamp when the voucher has been
                            activated (authorization time of the first guest)
                        expiresAt:
                          type: string
                          format: date-time
                          description: (Optional) timestamp when the voucher will
                            become expired. All guests using the voucher will be unauthorized
                            from network access
                        expired:
                          type: boolean
                          description: Whether the voucher has been expired and can
                            no longer be used to authorize network access
                        timeLimitMinutes:
                          type: integer
                          format: int64
                          description: 'How long (in minutes) the voucher will provide
                            access to the network since authorization of the first
                            guest.

                            Subsequently connected guests, if allowed, will share
                            the same expiration time.'
                          example: 1440
                        dataUsageLimitMBytes:
                          type: integer
                          format: int64
                          description: (Optional) data usage limit in megabytes
                          example: 1024
                        rxRateLimitKbps:
                          type: integer
                          format: int64
                          description: (Optional) download rate limit in kilobits
                            per second
                          example: 1000
                        txRateLimitKbps:
                          type: integer
                          format: int64
                          description: (Optional) upload rate limit in kilobits per
                            second
                          example: 1000
                      required:
                      - authorizedGuestCount
                      - code
                      - createdAt
                      - expired
                      - id
                      - name
                      - timeLimitMinutes
                      title: Hotspot voucher details
                title: IntegrationVoucherCreationResultDto
    delete:
      tags:
      - Hotspot Vouchers
      summary: Delete Vouchers
      description: 'Remove Hotspot vouchers based on the specified filter criteria.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`UUID`|`eq` `ne` `in` `notIn`|

        |`createdAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

        |`code`|`STRING`|`eq` `ne` `in` `notIn`|

        |`authorizedGuestLimit`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge`
        `lt` `le`|

        |`authorizedGuestCount`|`NUMBER`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`activatedAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`expiresAt`|`TIMESTAMP`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`expired`|`BOOLEAN`|`eq` `ne`|

        |`timeLimitMinutes`|`NUMBER`|`eq` `ne` `gt` `ge` `lt` `le`|

        |`dataUsageLimitMBytes`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge`
        `lt` `le`|

        |`rxRateLimitKbps`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
        `le`|

        |`txRateLimitKbps`|`NUMBER`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
        `le`|

        </details>'
      operationId: deleteVouchers
      parameters:
      - name: filter
        in: query
        required: true
        schema:
          type: string
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  vouchersDeleted:
                    type: integer
                    format: int64
                title: Voucher deletion results
  /v1/sites/{siteId}/devices/{deviceId}/interfaces/ports/{portIdx}/actions:
    post:
      tags:
      - UniFi Devices
      summary: Execute Port Action
      description: Perform an action on a specific device port. The request body must
        include the action name and any applicable input arguments.
      operationId: executePortAction
      parameters:
      - name: portIdx
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              discriminator:
                propertyName: action
                mapping:
                  POWER_CYCLE: '#/components/schemas/PortPoEPowerCycleRequest'
              properties:
                action:
                  type: string
              required:
              - action
              title: Port action request
        required: true
      responses:
        '200':
          description: OK
  /v1/sites/{siteId}/devices/{deviceId}/actions:
    post:
      tags:
      - UniFi Devices
      summary: Execute Device Action
      description: Perform an action on an specific adopted device. The request body
        must include the action name and any applicable input arguments.
      operationId: executeDeviceAction
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              discriminator:
                propertyName: action
                mapping:
                  RESTART: '#/components/schemas/DeviceRestartRequest'
              properties:
                action:
                  type: string
              required:
              - action
              title: Device action request
        required: true
      responses:
        '200':
          description: OK
  /v1/sites/{siteId}/clients/{clientId}/actions:
    post:
      tags:
      - Clients
      summary: Execute Client Action
      description: Perform an action on a specific connected client. The request body
        must include the action name and any applicable input arguments.
      operationId: executeConnectedClientAction
      parameters:
      - name: clientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              discriminator:
                propertyName: action
                mapping:
                  AUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessAuthorizationRequest'
                  UNAUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessUnauthorizationRequest'
              properties:
                action:
                  type: string
              required:
              - action
              title: Client action request
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: action
                  mapping:
                    AUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessAuthorizationResponse'
                    UNAUTHORIZE_GUEST_ACCESS: '#/components/schemas/GuestAccessUnauthorizationResponse'
                properties:
                  action:
                    type: string
                required:
                - action
                title: Client action response
  /v1/sites:
    get:
      tags:
      - Sites
      summary: List Local Sites
      description: 'Retrieve a paginated list of local sites managed by this Network
        application.

        Site ID is required for other UniFi Network API calls.


        <details>

        <summary>Filterable properties (click to expand)</summary>


        |Name|Type|Allowed functions|

        |-|-|-|

        |`id`|`UUID`|`eq` `ne` `in` `notIn`|

        |`internalReference`|`STRING`|`eq` `ne` `in` `notIn`|

        |`name`|`STRING`|`eq` `ne` `in` `notIn`|

        </details>'
      operationId: getSiteOverviewPage
      parameters:
      - name: offset
        in: query
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
      - name: limit
        in: query
        required: false
        schema:
          format: int32
          default: 25
          maximum: 200
          minimum: 0
      - name: filter
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  offset:
                    type: integer
                    format: int64
                    example: 0
                  limit:
                    type: integer
                    format: int32
                    example: 25
                  count:
                    type: integer
                    format: int32
                    example: 10
                  totalCount:
                    type: integer
                    format: int64
                    example: 1000
                  data:
                    type: array
                    items:
                      properties:
                        id:
                          type: string
                          format: uuid
                        internalReference:
                          type: string
                          description: Internal unique name of the site used in older
                            APIs
                        name:
                          type: string
                      required:
                      - id
                      - internalReference
                      - name
                      title: Site overview
                required:
                - count
                - data
                - limit
                - offset
                - totalCount
                title: Site overview page
  /v1/sites/{siteId}/hotspot/vouchers/{voucherId}:
    get:
      tags:
      - Hotspot Vouchers
      summary: Get Voucher Details
      description: Retrieve details of a specific Hotspot voucher.
      operationId: getVoucher
      parameters:
      - name: voucherId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                    format: uuid
                  createdAt:
                    type: string
                    format: date-time
                  name:
                    type: string
                    description: Voucher note, may contain duplicate values across
                      multiple vouchers
                    example: hotel-guest
                  code:
                    type: string
                    description: Secret code to active the voucher using the Hotspot
                      portal
                    example: 4861409510
                  authorizedGuestLimit:
                    type: integer
                    format: int64
                    description: (Optional) limit for how many different guests can
                      use the same voucher to authorize network access
                    example: 1
                  authorizedGuestCount:
                    type: integer
                    format: int64
                    description: For how many guests the voucher has been used to
                      authorize network access
                    example: 0
                  activatedAt:
                    type: string
                    format: date-time
                    description: (Optional) timestamp when the voucher has been activated
                      (authorization time of the first guest)
                  expiresAt:
                    type: string
                    format: date-time
                    description: (Optional) timestamp when the voucher will become
                      expired. All guests using the voucher will be unauthorized from
                      network access
                  expired:
                    type: boolean
                    description: Whether the voucher has been expired and can no longer
                      be used to authorize network access
                  timeLimitMinutes:
                    type: integer
                    format: int64
                    description: 'How long (in minutes) the voucher will provide access
                      to the network since authorization of the first guest.

                      Subsequently connected guests, if allowed, will share the same
                      expiration time.'
                    example: 1440
                  dataUsageLimitMBytes:
                    type: integer
                    format: int64
                    description: (Optional) data usage limit in megabytes
                    example: 1024
                  rxRateLimitKbps:
                    type: integer
                    format: int64
                    description: (Optional) download rate limit in kilobits per second
                    example: 1000
                  txRateLimitKbps:
                    type: integer
                    format: int64
                    description: (Optional) upload rate limit in kilobits per second
                    example: 1000
                required:
                - authorizedGuestCount
                - code
                - createdAt
                - expired
                - id
                - name
                - timeLimitMinutes
                title: Hotspot voucher details
    delete:
      tags:
      - Hotspot Vouchers
      summary: Delete Voucher
      description: Remove a specific Hotspot voucher.
      operationId: deleteVoucher
      parameters:
      - name: voucherId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  vouchersDeleted:
                    type: integer
                    format: int64
                title: Voucher deletion results
  /v1/sites/{siteId}/devices:
    get:
      tags:
      - UniFi Devices
      summary: List Devices
      description: Retrieve a paginated list of all adopted devices on a site, including
        basic device information.
      operationId: getDeviceOverviewPage
      parameters:
      - name: offset
        in: query
        required: false
        schema:
          format: int32
          default: 0
          minimum: 0
      - name: limit
        in: query
        required: false
        schema:
          format: int32
          default: 25
          maximum: 200
          minimum: 0
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  offset:
                    type: integer
                    format: int64
                    example: 0
                  limit:
                    type: integer
                    format: int32
                    example: 25
                  count:
                    type: integer
                    format: int32
                    example: 10
                  totalCount:
                    type: integer
                    format: int64
                    example: 1000
                  data:
                    type: array
                    items:
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          example: IW HD
                        model:
                          type: string
                          example: UHDIW
                        macAddress:
                          type: string
                          example: 94:2a:6f:26:c6:ca
                        ipAddress:
                          type: string
                          example: 192.168.1.55
                        state:
                          type: string
                          enum:
                          - ONLINE
                          - OFFLINE
                          - PENDING_ADOPTION
                          - UPDATING
                          - GETTING_READY
                          - ADOPTING
                          - DELETING
                          - CONNECTION_INTERRUPTED
                          - ISOLATED
                        features:
                          type: array
                          items:
                            type: string
                            enum:
                            - switching
                            - accessPoint
                            - gateway
                          uniqueItems: true
                        interfaces:
                          type: array
                          items:
                            type: string
                            enum:
                            - ports
                            - radios
                          uniqueItems: true
                      required:
                      - features
                      - id
                      - interfaces
                      - ipAddress
                      - macAddress
                      - model
                      - name
                      - state
                      title: Device overview
                required:
                - count
                - data
                - limit
                - offset
                - totalCount
                title: Device overview page
  /v1/sites/{siteId}/devices/{deviceId}:
    get:
      tags:
      - UniFi Devices
      summary: Get Device Details
      description: Retrieve detailed information about a specific adopted device,
        including firmware versioning, uplink state, details about device features
        and interfaces (ports, radios) and other key attributes.
      operationId: getDeviceDetails
      parameters:
      - name: siteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: deviceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                    example: IW HD
                  model:
                    type: string
                    example: UHDIW
                  supported:
                    type: boolean
                  macAddress:
                    type: string
                    example: 94:2a:6f:26:c6:ca
                  ipAddress:
                    type: string
                    example: 192.168.1.55
                  state:
                    type: string
                    enum:
                    - ONLINE
                    - OFFLINE
                    - PENDING_ADOPTION
                    - UPDATING
                    - GETTING_READY
                    - ADOPTING
                    - DELETING
                    - CONNECTION_INTERRUPTED
                    - ISOLATED
                  firmwareVersion:
                    type: string
                    example: 6.6.55
                  firmwareUpdatable:
                    type: boolean
                  adoptedAt:
                    type: string
                    format: date-time
                  provisionedAt:
                    type: string
                    format: date-time
                  configurationId:
                    type: string
                    example: 7596498d2f367dc2
                  uplink:
                    description: Uplink interface is device's connection to the parent
                      device in the network topology
                    properties:
                      deviceId:
                        type: string
                        format: uuid
                    required:
                    - deviceId
                    title: Device uplink interface overview
                  features:
                    properties:
                      switching:
                        example: {}
                        title: Switch feature overview
                      accessPoint:
                        example: {}
                        title: Access point feature overview
                    title: Device features
