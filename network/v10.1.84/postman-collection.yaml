- id: 78fa69db-cd77-45e6-8780-f8496b7a2956
  name: Sites
  description:
    content: 'Endpoints for listing and managing UniFi sites within a local Network
      application.

      Site ID is required for most other API requests.'
    type: text/plain
  item:
  - id: 7013b6ca-9be8-41b3-8c1c-0e179e0a31e7
    name: List Local Sites
    request:
      name: List Local Sites
      description:
        content: 'Retrieve a paginated list of local sites managed by this Network
          application.

          Site ID is required for other UniFi Network API calls.


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`id`|`UUID`|`eq` `ne` `in` `notIn`|

          |`internalReference`|`STRING`|`eq` `ne` `in` `notIn`|

          |`name`|`STRING`|`eq` `ne` `in` `notIn`|

          </details>'
        type: text/plain
      url:
        path:
        - v1
        - sites
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
          key: consoleId
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
    - id: 41196dae-ad00-4212-a716-4e7bc6df22cf
      name: OK
      originalRequest:
        url:
          path:
          - v1
          - sites
          host:
          - '{{baseUrl}}'
          query:
          - key: offset
            value: '0'
          - key: limit
            value: '25'
          - key: filter
            value: <string>
          variable:
          - description: ID of the console to proxy requests to
            type: any
            value: '{{consoleId}}'
            key: consoleId
        header:
        - key: Accept
          value: application/json
        method: GET
        body: {}
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: "{\n  \"count\": 10,\n  \"data\": [\n    {\n      \"id\": \"8a014172-9e3f-880e-638e-70844dba7224\"\
        ,\n      \"internalReference\": \"string\",\n      \"name\": \"string\"\n\
        \    },\n    {\n      \"id\": \"e6c64cf8-e085-df0a-d7ea-3b40cc908d76\",\n\
        \      \"internalReference\": \"string\",\n      \"name\": \"string\"\n  \
        \  }\n  ],\n  \"limit\": 25,\n  \"offset\": 0,\n  \"totalCount\": 1000\n}"
