        value: application/json
      body: "{\n  \"count\": 10,\n  \"data\": [\n    {\n      \"features\": [\n  \
        \      \"gateway\",\n        \"switching\"\n      ],\n      \"firmwareUpdatable\"\
        : true,\n      \"id\": \"815709f2-f1d5-2ca9-3736-8aed9c33fcb0\",\n      \"\
