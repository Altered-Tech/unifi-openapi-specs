    name: Get Application Info
    request:
      name: Get Application Info
      description:
        content: Retrieve general information about the UniFi Network application.
        type: text/plain
      url:
        path:
        - v1
        - info
        host:
        - '{{baseUrl}}'
        query: []
        variable:
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
          key: consoleId
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
    - id: d75541d3-27f4-4a76-b162-50e2b02a01aa
      name: OK
      originalRequest:
        url:
          path:
          - v1
          - info
          host:
          - '{{baseUrl}}'
          query: []
          variable:
          - description: ID of the console to proxy requests to
            type: any
            value: '{{consoleId}}'
            key: consoleId
        header:
        - key: Accept
          value: application/json
        method: GET
        body: {}
      status: OK
      code: 200
      header:
      - key: Content-Type
        value: application/json
      body: "{\n  \"applicationVersion\": \"9.1.0\"\n}"
      cookie: []
