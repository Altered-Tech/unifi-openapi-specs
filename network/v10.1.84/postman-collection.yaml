- id: 4810b527-c489-4271-a4e2-a732175d5c74
  name: UniFi Devices
  description:
    content: 'Endpoints to list, inspect, and interact with UniFi devices, including
      adopted and pending devices.

      Provides device stats, port control, and actions.'
    type: text/plain
  item:
  - id: 8524c4af-7a50-4594-a5d2-4e1644f95c8f
    name: List Adopted Devices
    request:
      name: List Adopted Devices
      description:
        content: 'Retrieve a paginated list of all adopted devices on a site, including
          basic device information.


          <details>

          <summary>Filterable properties (click to expand)</summary>


          |Name|Type|Allowed functions|

          |-|-|-|

          |`id`|`UUID`|`eq` `ne` `in` `notIn`|

          |`macAddress`|`STRING`|`eq` `ne` `in` `notIn`|

          |`ipAddress`|`STRING`|`eq` `ne` `in` `notIn`|

          |`name`|`STRING`|`eq` `ne` `in` `notIn` `like`|

          |`model`|`STRING`|`eq` `ne` `in` `notIn`|

          |`state`|`STRING`|`eq` `ne` `in` `notIn`|

          |`supported`|`BOOLEAN`|`eq` `ne`|

          |`firmwareVersion`|`STRING`|`isNull` `isNotNull` `eq` `ne` `gt` `ge` `lt`
          `le` `like` `in` `notIn`|

          |`firmwareUpdatable`|`BOOLEAN`|`eq` `ne`|

          |`features`|`SET(STRING)`|`isEmpty` `contains` `containsAny` `containsAll`
          `containsExactly`|

          |`interfaces`|`SET(STRING)`|`isEmpty` `contains` `containsAny` `containsAll`
          `containsExactly`|

          </details>'
        type: text/plain
      url:
        path:
        - v1
        - sites
        - :siteId
        - devices
        host:
        - '{{baseUrl}}'
        query:
        - disabled: false
          key: offset
          value: '0'
        - disabled: false
          key: limit
          value: '25'
        - disabled: false
          key: filter
          value: <string>
        variable:
        - disabled: false
          type: any
          value: <uuid>
          key: siteId
          description: '(Required) '
        - description: ID of the console to proxy requests to
          type: any
          value: '{{consoleId}}'
          key: consoleId
      header:
      - key: Accept
        value: application/json
      method: GET
      auth: null
    response:
    - id: 2edbbd7e-5fdc-4814-9692-3660c3de7c63
      name: OK
      originalRequest:
        url:
          path:
          - v1
          - sites
          - :siteId
