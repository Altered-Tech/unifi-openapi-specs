      properties:
        interfaceType:
          type: string
        clientAddressAssignment:
          $ref: '#/components/schemas/IPv6ClientAddressAssignment'
          description: Client Address Assignment
        routerAdvertisement:
          $ref: '#/components/schemas/RouterAdvertisementConfiguration'
          description: Router advertisement. Without it, hosts will not autoconfigure
