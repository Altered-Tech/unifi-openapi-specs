      allOf:
      - $ref: '#/components/schemas/NetworkIPv6Configuration'
      - type: object
        properties:
          prefixDelegationWanInterfaceId:
            type: string
            format: uuid
            description: ID of the WAN interface from which the prefix is delegated.
      required:
      - clientAddressAssignment
      - prefixDelegationWanInterfaceId
