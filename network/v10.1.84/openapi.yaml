        dnsServerIpAddressesOverride:
          type: array
          description: The IPv6 DNS server addresses assigned to this Network. If
            none are specified, they will be selected automatically.
          items:
            type: string
          maxItems: 4
          minItems: 1
        additionalHostIpSubnets:
          type: array
          description: Additional host IP subnets assigned to this VLAN.
          items:
            type: string
          maxItems: 4
          minItems: 1
      required:
      - clientAddressAssignment
      - interfaceType
