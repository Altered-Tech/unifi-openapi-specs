      discriminator:
        propertyName: mode
        mapping:
          SERVER: '#/components/schemas/GatewayManagedIPv4DHCPServerConfiguration'
          RELAY: '#/components/schemas/IPv4DHCPRelayConfiguration'
      oneOf:
      - $ref: '#/components/schemas/GatewayManagedIPv4DHCPServerConfiguration'
      - $ref: '#/components/schemas/IPv4DHCPRelayConfiguration'
    GatewayManagedIPv4DHCPServerConfiguration:
      allOf:
      - $ref: '#/components/schemas/GatewayManagedIPv4DHCPConfiguration'
      - type: object
        properties:
          ipAddressRange:
            $ref: '#/components/schemas/IPAddressRange'
          gatewayIpAddressOverride:
            type: string
            description: Gateway IP address provided to DHCP clients. If null, the
              default gateway will be assigned.
          dnsServerIpAddressesOverride:
            type: array
            description: List of DNS servers assigned to client devices by the DHCP
              server. If none are specified, they will be selected automatically.
            items:
              type: string
            maxItems: 4
            minItems: 1
          leaseTimeSeconds:
            type: integer
            format: int32
            description: The lease time in seconds for addresses in this range.
            maximum: 31536000
            minimum: 0
          domainName:
            type: string
            description: Domain name that can be used to access network in the browser.
          pingConflictDetectionEnabled:
            type: boolean
          pxeConfiguration:
            $ref: '#/components/schemas/PXEConfiguration'
            description: Pre execution environment configuration for network boot
          ntpServerIpAddresses:
            type: array
            description: Network Time Protocol (NTP) server IP addresses.
            items:
              type: string
            maxItems: 2
            minItems: 1
          option43Value:
            type: string
            description: Custom DHCP option (43) — the value MUST be the UniFi Network
              application's host IP address.
          tftpServerAddress:
            type: string
            description: Trivial File Transfer Protocol (TFTP) server address — accepts
              a hostname, URL or IP address.
          timeOffsetSeconds:
            type: integer
            format: int32
            description: Time offset in seconds from UTC.
            maximum: 86400
            minimum: -86400
          wpadUrl:
            type: string
            description: Web Proxy Auto-Discovery (WPAD) URL.
          winsServerIpAddresses:
            type: array
            description: Windows Internet Name Service (WINS) server IP addresses.
            items:
              type: string
            maxItems: 2
            minItems: 1
      required:
      - ipAddressRange
      - leaseTimeSeconds
      - pingConflictDetectionEnabled
    IPAddressSelector:
      discriminator:
        propertyName: type
        mapping:
          IP_ADDRESS: '#/components/schemas/IPAddressSelector'
          IP_ADDRESS_RANGE: '#/components/schemas/IPAddressRangeSelector'
      oneOf:
      - $ref: '#/components/schemas/IPAddressSelector'
      - $ref: '#/components/schemas/IPAddressRangeSelector'
    IPAddressRange:
      type: object
      properties:
        start:
          type: string
        stop:
          type: string
      required:
      - start
      - stop
    IPAddressRangeSelector:
      allOf:
      - $ref: '#/components/schemas/IPAddressSelector'
      - type: object
        properties:
          start:
            type: string
          stop:
            type: string
      required:
      - start
      - stop
    IPv4DHCPRelayConfiguration:
      allOf:
      - $ref: '#/components/schemas/GatewayManagedIPv4DHCPConfiguration'
      - type: object
        properties:
          dhcpServerIpAddresses:
            type: array
            description: DHCP Server IP addresses
            items:
              type: string
            minItems: 1
      - $ref: '#/components/schemas/SwitchManagedIPv4DHCPConfiguration'
      required:
      - dhcpServerIpAddresses
    IPv4DHCPServerConfiguration:
      allOf:
      - $ref: '#/components/schemas/SwitchManagedIPv4DHCPConfiguration'
      - type: object
        properties:
          ipAddressRange:
            $ref: '#/components/schemas/IPAddressRange'
          gatewayIpAddressOverride:
            type: string
            description: Gateway IP address provided to DHCP clients. If null, the
              default gateway will be assigned.
          dnsServerIpAddressesOverride:
            type: array
            description: List of DNS servers assigned to client devices by the DHCP
              server. If none are specified, they will be selected automatically.
            items:
              type: string
            maxItems: 4
            minItems: 1
          leaseTimeSeconds:
            type: integer
            format: int32
            description: The lease time in seconds for addresses in this range.
            maximum: 31536000
            minimum: 0
          domainName:
            type: string
            description: Domain name that can be used to access network in the browser.
      required:
      - ipAddressRange
      - leaseTimeSeconds
    IPv6ClientAddressAssignment:
      type: object
      properties:
        dhcpConfiguration:
          $ref: '#/components/schemas/DHCPConfigurationForIPv6Network'
          description: 'IPv6 DHCP configuration for this network. At least one addressing
            method must be active: either enable SLAAC or provide DHCP configuration.
            If this field is null, SLAAC must be enabled.'
        slaacEnabled:
          type: boolean
