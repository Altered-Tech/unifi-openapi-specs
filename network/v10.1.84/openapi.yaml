    CreateOrUpdateNetwork:
      type: object
      discriminator:
        propertyName: management
        mapping:
          UNMANAGED: '#/components/schemas/IntegrationUnmanagedNetworkCreateUpdateDto'
          GATEWAY: '#/components/schemas/IntegrationGatewayManagedNetworkCreateUpdateDto'
          SWITCH: '#/components/schemas/IntegrationSwitchManagedNetworkCreateUpdateDto'
      properties:
        management:
          type: string
        name:
          type: string
          example: Default Network
        enabled:
          type: boolean
        vlanId:
          type: integer
          format: int32
          description: VLAN ID. Must be 1 for the default network and >= 2 for additional
            networks.
          maximum: 4009
          minimum: 1
        dhcpGuarding:
          $ref: '#/components/schemas/NetworkDHCPGuarding'
          description: DHCP Guarding settings for this Network. If this field is omitted
            or null, the feature is disabled
      required:
      - enabled
      - management
      - name
      - vlanId
    DHCPConfigurationForIPv6Network:
      type: object
      properties:
        ipAddressSuffixRange:
          $ref: '#/components/schemas/IntegrationIpv6AddressSuffixRangeSelectorDto'
        leaseTimeSeconds:
          type: integer
          format: int32
          description: The lease time in seconds for IP addresses in this range.
          maximum: 31536000
          minimum: 0
      required:
      - ipAddressSuffixRange
      - leaseTimeSeconds
    GatewayManagedIPv4Configuration:
      type: object
      properties:
        autoScaleEnabled:
          type: boolean
          description: Whether the Network can automatically scale its subnet size
            based on the number of active DHCP leases.
        hostIpAddress:
          type: string
        prefixLength:
          type: integer
          format: int32
          maximum: 30
          minimum: 8
        additionalHostIpSubnets:
          type: array
          description: Additional host IP subnets assigned to this VLAN.
          items:
            type: string
          maxItems: 64
          minItems: 1
        dhcpConfiguration:
          $ref: '#/components/schemas/GatewayManagedIPv4DHCPConfiguration'
          description: IPv4 DHCP configuration for this network. If this field is
            omitted or null, DHCP is not working and hosts must get an address statically
            or from another server in this broadcast domain.
        natOutboundIpAddressConfiguration:
          type: array
          description: List of NAT Outbound Configurations defining which IP addresses
            are used for NAT translation. This array must contain all WAN interfaces
            with `static` or `PPPoE` IPv4 connection configuration.
          items:
            $ref: '#/components/schemas/WANNATOutboundConfiguration'
          maxItems: 2147483647
          minItems: 1
      required:
      - autoScaleEnabled
      - hostIpAddress
      - prefixLength
