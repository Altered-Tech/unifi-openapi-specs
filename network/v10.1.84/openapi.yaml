        properties:
          hostIpAddress:
            type: string
            description: The static IPv6 address assigned to this Network.
          prefixLength:
            type: integer
            format: int32
            maximum: 127
            minimum: 64
      required:
      - clientAddressAssignment
      - hostIpAddress
      - prefixLength
    IntegrationGatewayManagedNetworkCreateUpdateDto:
      allOf:
      - $ref: '#/components/schemas/CreateOrUpdateNetwork'
